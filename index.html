<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEN 2767 — Fase 1 Decompositie</title>
<script src="mapping.js"></script>
<style>
:root{
  --bg:#f4f3ef;--sur:#fff;--sur2:#eeede8;--sur3:#e5e4df;
  --bdr:rgba(0,0,0,.09);--bdr2:rgba(0,0,0,.16);
  --tx:#1a1a18;--tx2:#5a5a56;--tx3:#9a9a94;
  --blue:#1a5fa8;--blue-l:#e8f1fb;--blue-d:#134e8a;
  --green:#0e6e50;--green-l:#e1f4ec;
  --amber:#b87200;--amber-l:#fdf0d8;
  --red:#a02828;--red-l:#fbeaea;
  --orange:#d4620a;
  --r:7px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#18181a;--sur:#232326;--sur2:#2c2c30;--sur3:#323236;
  --bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.16);
  --tx:#eeeee8;--tx2:#9a9a94;--tx3:#55554e;
  --blue-l:#0f3d7022;--green-l:#0a4a3522;--amber-l:#5a380022;--red-l:#4a101022;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{background:var(--blue);color:#fff;display:flex;align-items:center;gap:8px;padding:0 14px;height:46px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-logo{font-size:14px;font-weight:800;letter-spacing:.4px}
.topbar-sep{width:1px;height:20px;background:rgba(255,255,255,.25);margin:0 2px}
.topbar-sub{font-size:11px;opacity:.65}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:5px}
.tbtn{padding:4px 10px;border:1px solid rgba(255,255,255,.28);border-radius:var(--r);font-size:11px;cursor:pointer;background:rgba(255,255,255,.1);color:#fff;font-family:inherit;white-space:nowrap;transition:background .12s;display:flex;align-items:center;gap:4px}
.tbtn:hover{background:rgba(255,255,255,.22)}
.tbtn.accent{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5);font-weight:700}
.tbtn:disabled{opacity:.35;cursor:default}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── LEFT: LIBRARY ── */
.library{width:220px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0}
.lib-head{padding:10px 12px 6px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.lib-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.lib-search{width:100%;padding:5px 8px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:11px;background:var(--sur2);color:var(--tx);outline:none;font-family:inherit}
.lib-search:focus{border-color:var(--blue)}
.lib-tabs{display:flex;gap:1px;margin-top:6px}
.lib-tab{flex:1;padding:4px 2px;text-align:center;font-size:10px;font-weight:600;cursor:pointer;border-radius:5px;color:var(--tx3);transition:all .12s}
.lib-tab:hover{background:var(--sur2);color:var(--tx)}
.lib-tab.active{background:var(--blue-l);color:var(--blue)}
.lib-items{flex:1;overflow-y:auto;padding:4px}
.lib-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:grab;font-size:11px;color:var(--tx2);transition:all .12s;user-select:none;margin-bottom:1px}
.lib-item:hover{background:var(--blue-l);color:var(--blue)}
.lib-item:active{cursor:grabbing;opacity:.7}
.lib-item-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.lib-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lib-item-code{font-size:9px;color:var(--tx3);font-family:monospace;flex-shrink:0}
.lib-item-fta{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── CENTER: TREE ── */
.tree-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tree-toolbar{padding:8px 12px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--sur)}
.tree-toolbar-title{font-size:12px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-btn{padding:4px 8px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:11px;cursor:pointer;background:var(--sur2);color:var(--tx2);font-family:inherit;white-space:nowrap;transition:all .12s}
.tree-btn:hover{background:var(--sur);border-color:var(--blue);color:var(--blue)}
.tree-content{flex:1;overflow-y:auto;padding:8px}
.drop-zone{border:2px dashed var(--bdr2);border-radius:var(--rl);padding:32px;text-align:center;color:var(--tx3);margin:8px;transition:all .2s}
.drop-zone.drag-over{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.drop-zone-icon{font-size:32px;margin-bottom:8px}
.drop-zone-text{font-size:13px;font-weight:600}
.drop-zone-sub{font-size:11px;margin-top:4px}

/* ── TREE NODES ── */
.tree-node{margin-bottom:2px}
.tree-node-row{display:flex;align-items:center;gap:0;border-radius:7px;cursor:pointer;transition:background .1s;position:relative}
.tree-node-row:hover{background:var(--sur2)}
.tree-node-row.selected{background:var(--blue-l) !important}
.tree-node-row.drag-over-node{background:var(--green-l);outline:2px dashed var(--green)}
.tree-toggle{width:20px;height:28px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx3);flex-shrink:0;transition:transform .15s}
.tree-toggle.open{transform:rotate(90deg)}
.tree-toggle.leaf{opacity:0;cursor:default}
.tree-icon{font-size:15px;flex-shrink:0;width:22px;text-align:center}
.tree-label{flex:1;font-size:12px;padding:6px 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tree-label-name{font-weight:600}
.tree-label-sub{font-size:10px;color:var(--tx3);font-weight:400}
.tree-fta{display:flex;align-items:center;gap:3px;flex-shrink:0;margin-right:4px}
.fta-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fta-ja{background:#0e6e50}
.fta-optioneel{background:#b87200}
.fta-nee{background:#a02828}
.fta-unknown{background:#9a9a94}
.tree-badge{padding:1px 5px;border-radius:10px;font-size:9px;font-weight:700;flex-shrink:0;margin-right:2px}
.tree-actions{display:none;gap:2px;flex-shrink:0;margin-right:4px}
.tree-node-row:hover .tree-actions{display:flex}
.tree-action-btn{width:22px;height:22px;border-radius:5px;border:none;background:none;cursor:pointer;color:var(--tx3);font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.tree-action-btn:hover{background:var(--sur3);color:var(--tx)}
.tree-children{padding-left:20px;display:none}
.tree-children.open{display:block}
/* Drag indicator */
.drag-indicator{height:2px;background:var(--blue);border-radius:2px;margin:1px 0;display:none}
.drag-indicator.show{display:block}

/* Level colors */
.node-areaal > .tree-node-row > .tree-label-name{color:var(--blue)}
.node-complex > .tree-node-row > .tree-label-name{}
.node-bo > .tree-node-row{background:rgba(26,95,168,.04)}
.node-el > .tree-node-row{}
.node-bd > .tree-node-row{}
.node-comp > .tree-node-row{opacity:.85}

/* ── RIGHT: DETAIL PANEL ── */
.detail-panel{width:300px;background:var(--sur);border-left:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--tx3);gap:8px;padding:24px;text-align:center}
.detail-empty-icon{font-size:36px}
.detail-content{flex:1;overflow-y:auto;padding:0}
.detail-header{padding:14px 14px 10px;border-bottom:1px solid var(--bdr)}
.detail-type-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:6px}
.badge-areaal{background:var(--blue-l);color:var(--blue)}
.badge-complex{background:var(--sur2);color:var(--tx2)}
.badge-bo{background:#fff3e0;color:#e65100}
.badge-el{background:var(--green-l);color:var(--green)}
.badge-bd{background:#f3e5f5;color:#7b1fa2}
.badge-comp{background:var(--sur2);color:var(--tx2)}
.detail-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:4px}
.detail-code{font-size:10px;font-family:monospace;color:var(--tx3)}
.detail-section{padding:10px 14px;border-bottom:1px solid var(--bdr)}
.detail-section-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.detail-field{margin-bottom:7px}
.detail-field label{font-size:10px;color:var(--tx3);display:block;margin-bottom:2px;font-weight:500}
.detail-field input,.detail-field select,.detail-field textarea{width:100%;padding:5px 8px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:11px;background:var(--sur2);color:var(--tx);outline:none;font-family:inherit}
.detail-field input:focus,.detail-field select:focus,.detail-field textarea:focus{border-color:var(--blue);background:var(--sur)}
.detail-field textarea{resize:vertical;min-height:52px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.detail-static{font-size:11px;color:var(--tx);line-height:1.5;background:var(--sur2);padding:6px 8px;border-radius:var(--r)}
.detail-fta-box{padding:8px 10px;border-radius:var(--r);margin-bottom:6px}
.fta-ja-box{background:var(--green-l);border:1px solid rgba(14,110,80,.2)}
.fta-optioneel-box{background:var(--amber-l);border:1px solid rgba(184,114,0,.2)}
.fta-nee-box{background:var(--red-l);border:1px solid rgba(160,40,40,.2)}
.fta-unknown-box{background:var(--sur2);border:1px solid var(--bdr2)}
.detail-fta-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.detail-fta-reason{font-size:11px;margin-top:3px;line-height:1.4}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.photo-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:5px;cursor:pointer;border:1px solid var(--bdr)}
.photo-add{aspect-ratio:4/3;border:2px dashed var(--bdr2);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--tx3);font-size:10px;gap:2px;transition:all .12s}
.photo-add:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.save-btn{width:100%;padding:8px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:4px}
.save-btn:hover{background:var(--blue-d)}

/* Children summary in detail */
.children-list{display:flex;flex-direction:column;gap:3px}
.child-item{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:11px;color:var(--tx2);transition:background .1s}
.child-item:hover{background:var(--sur2);color:var(--tx)}
.child-fta{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* FTA filter in detail */
.fta-filter{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.fta-btn{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s}
.fta-btn-ja{background:var(--green-l);color:var(--green);border-color:rgba(14,110,80,.2)}
.fta-btn-opt{background:var(--amber-l);color:var(--amber);border-color:rgba(184,114,0,.2)}
.fta-btn-nee{background:var(--red-l);color:var(--red);border-color:rgba(160,40,40,.2)}
.fta-btn.inactive{opacity:.35}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--sur);border-radius:var(--rl);padding:20px;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.25);max-height:80vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:700;margin-bottom:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
.btn{padding:6px 14px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:12px;cursor:pointer;background:var(--sur2);color:var(--tx);font-family:inherit;transition:all .12s}
.btn:hover{background:var(--sur3)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:var(--blue-d)}
.btn.danger{background:var(--red-l);color:var(--red);border-color:var(--red)}

/* FTA filter dialog */
.fta-dialog-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);margin-bottom:4px;cursor:pointer;border:1px solid var(--bdr);transition:all .12s}
.fta-dialog-item:hover{border-color:var(--blue);background:var(--blue-l)}
.fta-dialog-item.sel{border-color:var(--blue);background:var(--blue-l)}
.fta-dialog-icon{font-size:20px;width:24px;text-align:center}
.fta-dialog-text{flex:1}
.fta-dialog-title{font-size:12px;font-weight:600}
.fta-dialog-sub{font-size:10px;color:var(--tx3)}

/* ── TOAST ── */
.toast{position:fixed;bottom:16px;right:16px;background:var(--tx);color:var(--bg);padding:8px 14px;border-radius:var(--r);font-size:12px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;max-width:300px}
.toast.show{opacity:1}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:1000;display:none}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:86vh;border-radius:var(--r)}
.lightbox-close{position:absolute;top:14px;right:18px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;line-height:1}

/* Scrollbars */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-logo">NEN 2767</span>
  <div class="topbar-sep"></div>
  <span class="topbar-sub">Fase 1 — Decompositie</span>
  <div class="topbar-right">
    <button class="tbtn" onclick="newProject()">＋ Nieuw</button>
    <button class="tbtn" onclick="saveJSON()">💾 Opslaan</button>
    <button class="tbtn" onclick="document.getElementById('loadFile').click()">📂 Laden</button>
    <input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadJSON(this)">
    <button class="tbtn" onclick="exportCSV()">⬇ CSV</button>
    <button class="tbtn" id="btnUndo" onclick="undo()" disabled>↩ Ongedaan</button>
    <div class="topbar-sep"></div>
    <button class="tbtn accent" onclick="goToFase2()">📋 Fase 2 →</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LIBRARY -->
  <div class="library">
    <div class="lib-head">
      <div class="lib-title">NEN 2767 Bibliotheek</div>
      <input class="lib-search" id="libSearch" placeholder="Zoeken…" oninput="filterLib()">
      <div class="lib-tabs">
        <div class="lib-tab active" data-tab="bo" onclick="switchLibTab('bo')">BO <span id="cnt-bo"></span></div>
        <div class="lib-tab" data-tab="el" onclick="switchLibTab('el')">EL <span id="cnt-el"></span></div>
        <div class="lib-tab" data-tab="bd" onclick="switchLibTab('bd')">BD <span id="cnt-bd"></span></div>
        <div class="lib-tab" data-tab="gb" onclick="switchLibTab('gb')">GB <span id="cnt-gb"></span></div>
      </div>
    </div>
    <div class="lib-items" id="libItems"></div>
  </div>

  <!-- TREE -->
  <div class="tree-panel">
    <div class="tree-toolbar">
      <span class="tree-toolbar-title" id="projectName">Nieuw project</span>
      <button class="tree-btn" onclick="editProjectName()">✏️</button>
      <button class="tree-btn" onclick="addAreaal()">＋ Areaal</button>
      <button class="tree-btn" onclick="expandAll()">▼ Alles</button>
      <button class="tree-btn" onclick="collapseAll()">▶ Inklappen</button>
    </div>
    <div class="tree-content" id="treeContent"
         ondragover="onTreeDragOver(event)"
         ondrop="onTreeDrop(event)"
         ondragleave="onTreeDragLeave(event)">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">🏗</div>
        <div class="drop-zone-text">Sleep een Beheerobject hierheen</div>
        <div class="drop-zone-sub">Of klik op "+ Areaal" om te beginnen</div>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty" id="detailEmpty">
      <div class="detail-empty-icon">👆</div>
      <div style="font-size:12px;font-weight:600">Selecteer een item</div>
      <div style="font-size:11px">Klik op een node in de boom om details te zien</div>
    </div>
    <div class="detail-content" id="detailContent" style="display:none"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  ICONS
// ═══════════════════════════════════════════════════════════════
const BO_ICONS={
  'Aanleginrichting':'⚓','Aquaduct':'🌉','Begraafplaats':'🪦',
  'Beheerobject Overstijgende Voorziening':'🏢','Beluchtingstank':'💨',
  'Bezinkbassin':'🪣','Bosgebied':'🌲','Brug (beweegbaar)':'🏗',
  'Brug (vast)':'🌁','Bunker':'🏰','Coupure':'🚧','Dam':'🏞',
  'Dijk':'🛡','Drinkwaterinlaat':'🚰','Duiker':'🔵','Duingebied':'🏖',
  'Ecoduct':'🦌','Faunatunnel':'🦊','Gemaal':'⚙️','Gistingstank':'🧪',
  'Grondkering':'🪨','Haven':'⚓','Hevel':'🌊',
  'Individuele Behandeling van Afvalwater systeem (IBA-systeem)':'♻️',
  'Infragebonden gebouw':'🏭','Kabel en leiding':'🔌','Kade':'🚢',
  'Kanaal':'🛶','Keersluis':'🚪','Landbouwgebied':'🌾','Meer':'🏞',
  'Natuurgebied':'🌿','Onderdoorgang':'🚇',
  'Ontvangst- en verdeelwerk':'🏭','Open tunnelbak':'🚇',
  'Opslagtank':'🛢','Overkluizing':'🌉','Park':'🌳','Persleiding':'🔩',
  'Procesbassin':'🧫','Recreatief gebied':'🎯','Riolering':'🕳',
  'Rivier':'🌊','Schutsluis':'🚪','Sifon':'〰️','Spoorweg':'🚆',
  'Sport- en spelvoorziening':'⚽','Spuisluis':'🚪',
  'Stormvloedkering':'🌊','Stuw':'🌊','Terrein':'🟫','Tunnel':'🚇',
  'Uiterwaard':'🌾','Verkeerscentrale':'🎛','Verzorgingsplaats':'🛣',
  'Viaduct':'🌉','Water en watergang (lijnvormig), overig':'〰️',
  'Water en watergang (niet lijnvormig), overig':'💧',
  'Waterbuffer':'💧','Waterreguleringswerk':'🔧','Weg':'🛣',
  'Windmolen':'🌬','Zandfilterbassin':'🪨','Zee':'🌊',
};
const boIcon = n => BO_ICONS[n] || '🏗';
const FTA_COLORS = {ja:'#0e6e50',optioneel:'#b87200',nee:'#a02828','':'#9a9a94'};

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let projectName = 'Nieuw project';
let tree = [];   // [{type:'areaal',id,label,children:[{type:'complex',...}]}]
let idC = 1;
let selectedId = null;
let libTab = 'bo';
let dragSrc = null;  // {source:'library'|'tree', data:{...}}
let undoStack = [];
const MAX_UNDO = 15;

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid = () => 'n' + (idC++);

// FTA lookup
const FTA_BO_EL = typeof MAP_BO_EL !== 'undefined' ? MAP_BO_EL : {};
const FTA_EL_BD = typeof MAP_EL_BD !== 'undefined' ? MAP_EL_BD : {};
const FTA_BD_GB = typeof MAP_BD_GB !== 'undefined' ? MAP_BD_GB : {};

// ═══════════════════════════════════════════════════════════════
//  FTA ENGINE — automatic ja/optioneel/nee by category rules
// ═══════════════════════════════════════════════════════════════
const FTA_RULES = {
  // Element → BD level rules based on category keywords
  el_rules: [
    {match: ['aandrijving','bewegingswerk'], result: 'ja', reason: 'Aandrijfsysteem is primair voor beweging'},
    {match: ['fundering','hoofddraagconstructie','wandconstructie','vloerconstructie','dakconstructie'], result: 'ja', reason: 'Structureel kritisch element'},
    {match: ['pompinstallatie','pomp'], result: 'ja', reason: 'Primair: verpomping is kernfunctie'},
    {match: ['kabel','laagspanning','hoogspanning'], result: 'ja', reason: 'Energievoorziening, kritisch'},
    {match: ['telemetrie','besturing','bedienings'], result: 'ja', reason: 'Sturing/monitoring, kritisch'},
    {match: ['terreinmeubilair','recreatie','sport'], result: 'nee', reason: 'Comfort/recreatie, niet functiekritisch'},
    {match: ['brandblusinstallatie','brandmeld'], result: 'optioneel', reason: 'Veiligheid, ondersteunend'},
    {match: ['verlichting','openbare verlichting'], result: 'optioneel', reason: 'Verlichting, ondersteunend'},
  ],
  // BD level rules  
  bd_rules: [
    {match: ['motor','aandrijving'], result: 'ja', reason: 'Aandrijvingscomponent, primair'},
    {match: ['fundering','draagconstructie'], result: 'ja', reason: 'Structureel, kritisch'},
    {match: ['afdichting','waterdichting'], result: 'ja', reason: 'Waterdichtheid, kritisch'},
    {match: ['deksel','luik'], result: 'optioneel', reason: 'Toegang/bescherming, ondersteunend'},
  ]
};

function getFtaForEl(boName, elName) {
  // First check explicit mapping
  if (FTA_BO_EL[boName]) {
    const found = FTA_BO_EL[boName].els.find(e => e.el === elName);
    if (found) return {m: found.m || 'ja', fta: found.fta || ''};
  }
  // Apply category rules
  const el_lower = elName.toLowerCase();
  for (const rule of FTA_RULES.el_rules) {
    if (rule.match.some(kw => el_lower.includes(kw))) {
      return {m: rule.result, fta: rule.reason};
    }
  }
  return {m: 'ja', fta: 'Standaard: opgenomen in decompositie'};
}

function getFtaForBd(elName, bdName) {
  if (FTA_EL_BD[elName]) {
    const found = FTA_EL_BD[elName].bds.find(b => b.bd === bdName);
    if (found) return {m: found.m || 'ja', fta: found.fta || ''};
  }
  const bd_lower = bdName.toLowerCase();
  for (const rule of FTA_RULES.bd_rules) {
    if (rule.match.some(kw => bd_lower.includes(kw))) {
      return {m: rule.result, fta: rule.reason};
    }
  }
  return {m: 'ja', fta: 'Standaard bouwdeel'};
}

function getElsForBO(boName, filter='ja') {
  // Get all elements for a BO from mapping + FTA
  const result = [];
  if (FTA_BO_EL[boName]) {
    for (const e of FTA_BO_EL[boName].els) {
      if (filter === 'ja' && e.m !== 'ja') continue;
      if (filter === 'ja_opt' && e.m === 'nee') continue;
      result.push({...e});
    }
  }
  return result;
}

function getBdsForEl(elName, filter='ja') {
  const result = [];
  if (FTA_EL_BD[elName]) {
    for (const b of FTA_EL_BD[elName].bds) {
      if (filter === 'ja' && b.m !== 'ja') continue;
      if (filter === 'ja_opt' && b.m === 'nee') continue;
      result.push({...b});
    }
  }
  return result;
}

// ═══════════════════════════════════════════════════════════════
//  TREE HELPERS
// ═══════════════════════════════════════════════════════════════
function findNode(id, nodes) {
  for (const n of nodes) {
    if (n.id === id) return n;
    if (n.children) {
      const found = findNode(id, n.children);
      if (found) return found;
    }
  }
  return null;
}
function findParent(id, nodes, parent=null) {
  for (const n of nodes) {
    if (n.id === id) return parent;
    if (n.children) {
      const found = findParent(id, n.children, n);
      if (found !== undefined) return found;
    }
  }
  return undefined;
}
function removeNode(id, nodes) {
  for (let i=0; i<nodes.length; i++) {
    if (nodes[i].id === id) { nodes.splice(i,1); return true; }
    if (nodes[i].children && removeNode(id, nodes[i].children)) return true;
  }
  return false;
}
function flattenTree(nodes, arr=[]) {
  for (const n of nodes) { arr.push(n); if (n.children) flattenTree(n.children, arr); }
  return arr;
}

function pushUndo() {
  undoStack.push(JSON.stringify({tree, idC, projectName}));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  document.getElementById('btnUndo').disabled = false;
}

function undo() {
  if (!undoStack.length) return;
  const s = JSON.parse(undoStack.pop());
  tree = s.tree; idC = s.idC; projectName = s.projectName;
  if (!undoStack.length) document.getElementById('btnUndo').disabled = true;
  renderTree(); renderDetail(selectedId);
  toast('↩ Ongedaan gemaakt');
}

// ═══════════════════════════════════════════════════════════════
//  LIBRARY
// ═══════════════════════════════════════════════════════════════
function initLib() {
  document.getElementById('cnt-bo').textContent = BO.length;
  document.getElementById('cnt-el').textContent = EL.length;
  document.getElementById('cnt-bd').textContent = BD.length;
  document.getElementById('cnt-gb').textContent = GB.length;
  renderLib();
}

function getLibData() {
  if (libTab==='bo') return BO.map(b=>({...b, _type:'bo'}));
  if (libTab==='el') return EL.map(e=>({...e, _type:'el'}));
  if (libTab==='bd') return BD.map(b=>({...b, _type:'bd'}));
  return GB.map(g=>({...g, _type:'gb'}));
}

function renderLib() {
  const q = document.getElementById('libSearch').value.toLowerCase();
  const items = getLibData().filter(i =>
    !q || i.n.toLowerCase().includes(q) || (i.c&&String(i.c).toLowerCase().includes(q))
  );
  const container = document.getElementById('libItems');
  if (!items.length) { container.innerHTML = '<div style="padding:16px;text-align:center;font-size:11px;color:var(--tx3)">Geen resultaten</div>'; return; }
  container.innerHTML = items.slice(0,200).map(item => {
    const icon = item._type==='bo' ? boIcon(item.n) : item._type==='el' ? '🔧' : item._type==='bd' ? '🧱' : '⚠';
    const ftaColor = item.fta ? (item.fta==='JA'||item.fta==='ja'?'#0e6e50':item.fta.includes('OPT')||item.fta==='optioneel'?'#b87200':'#a02828') : 'transparent';
    return `<div class="lib-item" draggable="true"
      data-type="${item._type}" data-name="${esc(item.n)}" data-code="${esc(item.c||'')}"
      ondragstart="onLibDragStart(event,${JSON.stringify({type:item._type,n:item.n,c:item.c||'',d:item.d||'',v:item.v||'',eg:item.eg||'',f:item.f||'',fta:item.fta||''}).replace(/"/g,"'")})"
      onclick="libItemClick(${JSON.stringify({type:item._type,n:item.n,c:item.c||''}).replace(/"/g,"'")})">
      <div class="lib-item-icon">${icon}</div>
      <div class="lib-item-name">${esc(item.n)}</div>
      <div class="lib-item-code">${item.c||''}</div>
      <div class="lib-item-fta" style="background:${ftaColor}"></div>
    </div>`;
  }).join('');
}

function switchLibTab(tab) {
  libTab = tab;
  document.querySelectorAll('.lib-tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  document.getElementById('libSearch').value = '';
  renderLib();
}
function filterLib() { renderLib(); }

// ═══════════════════════════════════════════════════════════════
//  DRAG & DROP — Library → Tree
// ═══════════════════════════════════════════════════════════════
function onLibDragStart(e, itemData) {
  dragSrc = {source:'library', data: typeof itemData==='string' ? JSON.parse(itemData.replace(/'/g,'"')) : itemData};
  e.dataTransfer.effectAllowed = 'copy';
}

function onTreeDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  const dz = document.getElementById('dropZone');
  if (dz) dz.classList.add('drag-over');
}
function onTreeDragLeave(e) {
  if (!document.getElementById('treeContent').contains(e.relatedTarget)) {
    const dz = document.getElementById('dropZone');
    if (dz) dz.classList.remove('drag-over');
  }
}
function onTreeDrop(e) {
  e.preventDefault();
  const dz = document.getElementById('dropZone');
  if (dz) dz.classList.remove('drag-over');
  if (!dragSrc) return;
  if (dragSrc.source === 'library' && dragSrc.data.type === 'bo') {
    dropBOOnRoot(dragSrc.data);
  }
  dragSrc = null;
}

function onNodeDragOver(e, nodeId) {
  e.preventDefault(); e.stopPropagation();
  e.dataTransfer.dropEffect = 'copy';
  document.querySelectorAll('.tree-node-row').forEach(r => r.classList.remove('drag-over-node'));
  const el = document.getElementById('row_'+nodeId);
  if (el) el.classList.add('drag-over-node');
}
function onNodeDragLeave(e, nodeId) {
  const el = document.getElementById('row_'+nodeId);
  if (el) el.classList.remove('drag-over-node');
}
function onNodeDrop(e, nodeId) {
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.tree-node-row').forEach(r => r.classList.remove('drag-over-node'));
  if (!dragSrc) return;
  const targetNode = findNode(nodeId, tree);
  if (!targetNode) return;
  const d = dragSrc.data;

  if (dragSrc.source === 'library') {
    if (d.type==='bo' && (targetNode.type==='areaal'||targetNode.type==='complex')) {
      dropBOOnTarget(d, targetNode);
    } else if (d.type==='el' && targetNode.type==='bo') {
      addElementToBO(targetNode, d);
    } else if (d.type==='bd' && targetNode.type==='el') {
      addBouwdeelToEl(targetNode, d);
    } else if (d.type==='gb' && targetNode.type==='bd') {
      toast('Gebreken worden beheerd in Fase 2 — Conditiemeting');
    } else {
      toast('Hier kun je dat type niet plaatsen');
    }
  }
  dragSrc = null;
}

// ═══════════════════════════════════════════════════════════════
//  BUILD TREE NODES
// ═══════════════════════════════════════════════════════════════
function dropBOOnRoot(boData) {
  // If no areaal yet, create one
  if (!tree.length) {
    pushUndo();
    const areaal = {id:uid(), type:'areaal', label:'Areaal 1', children:[]};
    const complex = {id:uid(), type:'complex', label:'Complex 1', children:[]};
    areaal.children.push(complex);
    tree.push(areaal);
    addBOToComplex(complex, boData);
  } else {
    // Show FTA filter dialog first
    showFtaFilterDialog(boData, null);
  }
}

function dropBOOnTarget(boData, targetNode) {
  if (targetNode.type === 'areaal') {
    if (!targetNode.children.length) {
      const complex = {id:uid(), type:'complex', label:'Complex 1', children:[]};
      targetNode.children.push(complex);
    }
    showFtaFilterDialog(boData, targetNode.children[0]);
  } else if (targetNode.type === 'complex') {
    showFtaFilterDialog(boData, targetNode);
  }
}

function showFtaFilterDialog(boData, targetComplex) {
  const hasMapping = !!FTA_BO_EL[boData.n];
  const jaCount = hasMapping ? FTA_BO_EL[boData.n].els.filter(e=>e.m==='ja').length : 0;
  const optCount = hasMapping ? FTA_BO_EL[boData.n].els.filter(e=>e.m==='optioneel').length : 0;
  const allCount = hasMapping ? FTA_BO_EL[boData.n].els.length : 0;

  showModal(`${boIcon(boData.n)} ${boData.n} toevoegen`,
    `<p style="font-size:12px;color:var(--tx2);margin-bottom:12px">
      ${hasMapping ? `FTA-analyse: <b>${allCount}</b> elementen gevonden` : 'Geen FTA-mapping beschikbaar — alle elementen worden toegevoegd'}
    </p>
    <div class="fta-dialog-item" id="fta-opt-ja" onclick="selectFtaOpt('ja')" style="border-color:var(--green)">
      <div class="fta-dialog-icon">🟢</div>
      <div class="fta-dialog-text">
        <div class="fta-dialog-title">Alleen kritische elementen (JA)</div>
        <div class="fta-dialog-sub">${jaCount} elementen — primair voor de functie</div>
      </div>
    </div>
    <div class="fta-dialog-item" id="fta-opt-jaopt" onclick="selectFtaOpt('ja_opt')">
      <div class="fta-dialog-icon">🟡</div>
      <div class="fta-dialog-text">
        <div class="fta-dialog-title">Kritisch + Optioneel</div>
        <div class="fta-dialog-sub">${jaCount+optCount} elementen — incl. ondersteunend</div>
      </div>
    </div>
    <div class="fta-dialog-item" id="fta-opt-all" onclick="selectFtaOpt('all')">
      <div class="fta-dialog-icon">⚪</div>
      <div class="fta-dialog-text">
        <div class="fta-dialog-title">Alle elementen</div>
        <div class="fta-dialog-sub">${allCount} elementen — incl. niet-relevant</div>
      </div>
    </div>`,
    [
      {l:'Annuleren', c:'btn', cb:closeModal},
      {l:'Toevoegen', c:'btn primary', cb:()=>{
        const sel = document.querySelector('.fta-dialog-item.sel');
        const filter = sel ? sel.id.replace('fta-opt-','') : 'ja';
        closeModal();
        pushUndo();
        if (!targetComplex) {
          const areaal = {id:uid(), type:'areaal', label:'Areaal 1', children:[]};
          const complex = {id:uid(), type:'complex', label:'Complex 1', children:[]};
          areaal.children.push(complex);
          tree.push(areaal);
          addBOToComplex(complex, boData, filter);
        } else {
          addBOToComplex(targetComplex, boData, filter);
        }
      }}
    ]
  );
  // Pre-select first option
  setTimeout(()=>{
    const first = document.getElementById('fta-opt-ja');
    if(first) first.classList.add('sel');
  },50);
}

function selectFtaOpt(opt) {
  document.querySelectorAll('.fta-dialog-item').forEach(i=>i.classList.remove('sel'));
  document.getElementById('fta-opt-'+opt)?.classList.add('sel');
}

function addBOToComplex(complex, boData, filter='ja') {
  const boNode = {
    id: uid(), type:'bo',
    label: boData.n, code: boData.c, def: boData.d,
    icon: boIcon(boData.n),
    wcode:'', status:'actief', bouwjaar:'', levensduur:'',
    adres:'', stad:'', lat:'', lon:'', notitie:'', photos:[],
    pf: FTA_BO_EL[boData.n]?.pf || '',
    children: []
  };

  // Build elements
  const els = getElsForBO(boData.n, filter==='all'?'all':filter);
  for (const e of els) {
    const elData = EL.find(x=>x.n===e.el) || {n:e.el, c:'', eg:'', v:'', f:''};
    addElementToBO(boNode, {
      type:'el', n:e.el, c:elData.c, eg:elData.eg, v:elData.v, f:elData.f,
      _fta:{m:e.m, fta:e.fta}
    }, filter);
  }

  // If no elements from mapping, add placeholder
  if (!boNode.children.length && filter!=='all') {
    toast(`ℹ ${boData.n}: nog geen elementen in database — voeg handmatig toe`);
  }

  complex.children.push(boNode);
  renderTree();
  selectNode(boNode.id);
  toast(`✓ ${boData.n} toegevoegd met ${boNode.children.length} elementen`);
}

function addElementToBO(boNode, elData, bdFilter='ja') {
  const ftaInfo = elData._fta || getFtaForEl(boNode.label, elData.n);
  const elNode = {
    id: uid(), type:'el',
    label: elData.n, code: elData.c||'', eg: elData.eg||'',
    vak: elData.v||'', func: elData.f||'',
    fta_m: ftaInfo.m||'ja', fta_r: ftaInfo.fta||'',
    pf: FTA_EL_BD[elData.n]?.pf || '',
    notitie:'', children:[]
  };

  // Build bouwdelen
  const bds = getBdsForEl(elData.n, bdFilter==='all'?'all':bdFilter);
  for (const b of bds) {
    const bdData = BD.find(x=>x.n===b.bd) || {n:b.bd,c:'',d:'',v:'',fta:'',fr:''};
    const bdNode = {
      id: uid(), type:'bd',
      label: b.bd, code: bdData.c||'',
      def: bdData.d||'', vak: bdData.v||'',
      fta_m: b.m||'ja', fta_r: b.fta||'',
      bd_fta: bdData.fta||'', bd_fr: bdData.fr||'',
      notitie:'', photos:[], children:[]
    };
    elNode.children.push(bdNode);
  }

  boNode.children.push(elNode);
  renderTree();
  return elNode;
}

function addBouwdeelToEl(elNode, bdData) {
  pushUndo();
  const ftaInfo = getFtaForBd(elNode.label, bdData.n);
  const bdLib = BD.find(x=>x.n===bdData.n) || {};
  const bdNode = {
    id:uid(), type:'bd',
    label:bdData.n, code:bdData.c||bdLib.c||'',
    def:bdData.d||bdLib.d||'', vak:bdData.v||bdLib.v||'',
    fta_m:ftaInfo.m, fta_r:ftaInfo.fta,
    bd_fta:bdLib.fta||'', bd_fr:bdLib.fr||'',
    notitie:'', photos:[], children:[]
  };
  elNode.children.push(bdNode);
  renderTree();
  selectNode(bdNode.id);
  toast(`✓ ${bdData.n} toegevoegd`);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER TREE
// ═══════════════════════════════════════════════════════════════
function renderTree() {
  const tc = document.getElementById('treeContent');
  const dz = document.getElementById('dropZone');
  if (!tree.length) {
    if (dz) dz.style.display = '';
    tc.innerHTML = '';
    tc.appendChild(createDropZone());
    return;
  }
  if (dz) dz.style.display = 'none';
  tc.innerHTML = tree.map(n=>renderNode(n,0)).join('');
  // Re-attach open state
  document.querySelectorAll('.tree-children').forEach(el=>{
    const id = el.dataset.parent;
    const node = findNode(id, tree);
    if (node && node._open !== false) el.classList.add('open');
  });
}

function createDropZone() {
  const dz = document.createElement('div');
  dz.className='drop-zone'; dz.id='dropZone';
  dz.innerHTML='<div class="drop-zone-icon">🏗</div><div class="drop-zone-text">Sleep een Beheerobject hierheen</div><div class="drop-zone-sub">Of klik op "+ Areaal" om te beginnen</div>';
  return dz;
}

function renderNode(node, depth) {
  const hasChildren = node.children && node.children.length > 0;
  const isOpen = node._open !== false;
  const isSelected = node.id === selectedId;
  const indent = depth * 16;

  let icon = '';
  let ftaBadge = '';
  let subtxt = '';

  if (node.type==='areaal') { icon='🗂'; subtxt=`${node.children?.length||0} complexen`; }
  else if (node.type==='complex') { icon='📦'; subtxt=`${node.children?.length||0} objecten`; }
  else if (node.type==='bo') {
    icon=boIcon(node.label);
    subtxt = node.code ? `${node.code} · ${node.children?.length||0} elementen` : `${node.children?.length||0} elementen`;
  }
  else if (node.type==='el') {
    icon='🔧';
    const m = node.fta_m||'';
    const col = FTA_COLORS[m]||FTA_COLORS[''];
    ftaBadge=`<div class="fta-dot" style="background:${col}" title="FTA: ${m}"></div>`;
    subtxt = node.eg ? node.eg : '';
  }
  else if (node.type==='bd') {
    icon='🧱';
    const m = node.fta_m||'';
    const col = FTA_COLORS[m]||FTA_COLORS[''];
    ftaBadge=`<div class="fta-dot" style="background:${col}" title="FTA: ${m}"></div>`;
    subtxt = node.vak||'';
  }
  else if (node.type==='comp') { icon='⚙'; }

  const toggleClass = hasChildren ? (isOpen?'open':'') : 'leaf';
  
  return `<div class="tree-node node-${node.type}" id="node_${node.id}">
    <div class="tree-node-row${isSelected?' selected':''}" id="row_${node.id}"
      style="padding-left:${indent}px"
      onclick="selectNode('${node.id}')"
      ondragover="onNodeDragOver(event,'${node.id}')"
      ondragleave="onNodeDragLeave(event,'${node.id}')"
      ondrop="onNodeDrop(event,'${node.id}')">
      <div class="tree-toggle ${toggleClass}" onclick="event.stopPropagation();toggleNode('${node.id}')">${hasChildren?'▶':''}</div>
      <div class="tree-icon">${icon}</div>
      <div class="tree-label">
        <span class="tree-label-name">${esc(node.label)}</span>
        ${subtxt?`<span class="tree-label-sub"> — ${esc(subtxt)}</span>`:''}
      </div>
      ${ftaBadge?`<div class="tree-fta">${ftaBadge}</div>`:''}
      <div class="tree-actions">
        ${node.type!=='comp'&&node.type!=='bd'?`<button class="tree-action-btn" onclick="event.stopPropagation();addChild('${node.id}')" title="Toevoegen">＋</button>`:''}
        <button class="tree-action-btn" onclick="event.stopPropagation();deleteNode('${node.id}')" title="Verwijderen">✕</button>
      </div>
    </div>
    ${hasChildren?`<div class="tree-children${isOpen?' open':''}" data-parent="${node.id}">
      ${node.children.map(c=>renderNode(c,depth+1)).join('')}
    </div>`:''}
  </div>`;
}

function toggleNode(id) {
  const node = findNode(id, tree);
  if (!node) return;
  node._open = !(node._open !== false);
  const ch = document.querySelector(`[data-parent="${id}"]`);
  const tog = document.querySelector(`#row_${id} .tree-toggle`);
  if (ch) ch.classList.toggle('open', node._open);
  if (tog) { tog.classList.toggle('open', node._open); }
}
function expandAll() {
  flattenTree(tree).forEach(n=>n._open=true);
  renderTree();
}
function collapseAll() {
  flattenTree(tree).forEach(n=>{ if(n.type!=='areaal'&&n.type!=='complex') n._open=false; });
  renderTree();
}

function selectNode(id) {
  selectedId = id;
  document.querySelectorAll('.tree-node-row').forEach(r=>r.classList.remove('selected'));
  const row = document.getElementById('row_'+id);
  if (row) { row.classList.add('selected'); row.scrollIntoView({block:'nearest'}); }
  renderDetail(id);
}

function addChild(parentId) {
  const parent = findNode(parentId, tree);
  if (!parent) return;
  if (parent.type==='areaal') addComplex(parent);
  else if (parent.type==='complex') showAddBODialog(parent);
  else if (parent.type==='bo') showAddElDialog(parent);
  else if (parent.type==='el') showAddBDDialog(parent);
  else if (parent.type==='bd') addComponent(parent);
}

function deleteNode(id) {
  const node = findNode(id, tree);
  if (!node) return;
  showModal('Verwijderen',
    `<p style="font-size:12px">Wil je <b>${esc(node.label)}</b> en alle kinderen verwijderen?</p>`,
    [{l:'Annuleren',c:'btn',cb:closeModal},
     {l:'Verwijderen',c:'btn danger',cb:()=>{
       closeModal(); pushUndo();
       removeNode(id, tree);
       if (selectedId===id) { selectedId=null; showDetailEmpty(); }
       renderTree(); toast('Verwijderd');
     }}]
  );
}

function showDetailEmpty() {
  document.getElementById('detailEmpty').style.display='';
  document.getElementById('detailContent').style.display='none';
}

function renderDetail(id) {
  if (!id) { showDetailEmpty(); return; }
  const node = findNode(id, tree);
  if (!node) { showDetailEmpty(); return; }
  document.getElementById('detailEmpty').style.display='none';
  const dc = document.getElementById('detailContent');
  dc.style.display='block';
  dc.innerHTML = buildDetailHTML(node);
  // Init sig pads etc
  initDetailHandlers(node);
}

function buildDetailHTML(node) {
  const badgeClass = `badge-${node.type}`;
  const typeLabels = {areaal:'Areaal',complex:'Complex',bo:'Beheerobject',el:'Element',bd:'Bouwdeel',comp:'Component'};
  const typeLabel = typeLabels[node.type]||node.type;

  let html = `<div class="detail-header">
    <div class="detail-type-badge ${badgeClass}">${typeLabel}</div>
    <div class="detail-name">${esc(node.label)}</div>
    ${node.code?`<div class="detail-code">NEN Code: ${esc(node.code)}</div>`:''}
  </div>`;

  // FTA box for elements and bouwdelen
  if (node.type==='el'||node.type==='bd') {
    const m = node.fta_m||'';
    const boxClass = m==='ja'?'fta-ja-box':m==='optioneel'?'fta-optioneel-box':m==='nee'?'fta-nee-box':'fta-unknown-box';
    const labels={ja:'🟢 Kritisch (JA)',optioneel:'🟡 Optioneel',nee:'🔴 Niet relevant (NEE)','':'⚪ Onbekend'};
    const textColor={ja:'var(--green)',optioneel:'var(--amber)',nee:'var(--red)','':'var(--tx3)'};
    html+=`<div class="detail-section">
      <div class="detail-section-title">⚡ FTA Analyse</div>
      <div class="detail-fta-box ${boxClass}">
        <div class="detail-fta-label" style="color:${textColor[m]||textColor['']}">${labels[m]||labels['']}</div>
        ${node.fta_r?`<div class="detail-fta-reason">${esc(node.fta_r)}</div>`:''}
      </div>
      <div style="display:flex;gap:6px;margin-top:6px">
        ${['ja','optioneel','nee'].map(v=>`<button class="fta-btn fta-btn-${v==='ja'?'ja':v==='optioneel'?'opt':'nee'}${node.fta_m===v?'':' inactive'}" 
          onclick="setFta('${node.id}','${v}')">${v==='ja'?'🟢 JA':v==='optioneel'?'🟡 OPT':'🔴 NEE'}</button>`).join('')}
      </div>
    </div>`;
  }

  // Type-specific sections
  if (node.type==='bo') {
    html += buildBODetail(node);
  } else if (node.type==='el') {
    html += buildELDetail(node);
  } else if (node.type==='bd') {
    html += buildBDDetail(node);
  } else if (node.type==='areaal'||node.type==='complex') {
    html += buildContainerDetail(node);
  } else if (node.type==='comp') {
    html += buildCompDetail(node);
  }

  return html;
}

function updateNodeProp(id, prop, val) {
  const node = findNode(id, tree);
  if (!node) return;
  node[prop] = val;
  autoSave();
  // Update tree label if changed
  if (prop==='label') {
    const el = document.querySelector(`#row_${id} .tree-label-name`);
    if (el) el.textContent = val;
  }
}

function setFta(id, val) {
  const node = findNode(id, tree);
  if (!node) return;
  node.fta_m = val;
  renderTree();
  renderDetail(id);
  autoSave();
  toast(`FTA ingesteld op: ${val}`);
}

function addAreaal() {
  pushUndo();
  const a = {id:uid(),type:'areaal',label:'Areaal '+(tree.length+1),_open:true,children:[]};
  tree.push(a);
  renderTree();
  selectNode(a.id);
}

function addComplex(areaal) {
  pushUndo();
  const c = {id:uid(),type:'complex',label:'Complex '+(areaal.children.length+1),_open:true,children:[]};

}

const MAX_PX=800,JPEG_Q=0.78;
function compressImg(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>MAX_PX||h>MAX_PX){if(w>h){h=Math.round(h*MAX_PX/w);w=MAX_PX;}else{w=Math.round(w*MAX_PX/h);h=MAX_PX;}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res({data:c.toDataURL('image/jpeg',JPEG_Q),name:file.name});};img.src=e.target.result;};r.readAsDataURL(file);});}

async function addPhoto(nodeId, e) {
  const node = findNode(nodeId, tree);
  if (!node) return;
  const max = node.type==='bd' ? 3 : 5;
  const files = Array.from(e.target.files).slice(0, max-(node.photos||[]).length);
  if (!node.photos) node.photos=[];
  for (const f of files) { const c=await compressImg(f); node.photos.push(c); }
  renderDetail(nodeId); autoSave();
}
function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();closeModal();}});

//  PROJECT MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function editProjectName(){
  showModal('Projectnaam',
    `<input id="pname" value="${esc(projectName)}" style="width:100%;padding:7px 10px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:13px;font-family:inherit">`,
    [{l:'Annuleren',c:'btn',cb:closeModal},
     {l:'Opslaan',c:'btn primary',cb:()=>{const v=document.getElementById('pname').value.trim();if(v){projectName=v;document.getElementById('projectName').textContent=v;}closeModal();}}]
  );
  setTimeout(()=>document.getElementById('pname')?.select(),50);
}

function newProject(){
  showModal('Nieuw project',
    '<p style="font-size:12px">Huidige project wissen en opnieuw beginnen?</p>',
    [{l:'Annuleren',c:'btn',cb:closeModal},
     {l:'Nieuw starten',c:'btn danger',cb:()=>{closeModal();tree=[];idC=1;selectedId=null;projectName='Nieuw project';document.getElementById('projectName').textContent=projectName;showDetailEmpty();renderTree();autoSave();}}]
  );
}

function saveJSON(){
  const blob=new Blob([JSON.stringify({version:4,projectName,tree,idC},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(projectName||'project').replace(/[^a-z0-9]/gi,'_')+'_'+new Date().toISOString().split('T')[0].replace(/-/g,'')+'.json';
  a.click();toast('💾 Project opgeslagen');
}

function loadJSON(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.tree){
        pushUndo();tree=d.tree;idC=d.idC||idC;projectName=d.projectName||'Project';
        document.getElementById('projectName').textContent=projectName;
        renderTree();showDetailEmpty();autoSave();
        toast('✓ Project geladen');
      }
    }catch{toast('⚠ Kan bestand niet lezen');}
  };r.readAsText(f);inp.value='';
}

function exportCSV(){
  const rows=[['Type','Naam','Code','EG','Status','Bouwjaar','Adres','FTA','Notitie']];
  flattenTree(tree).forEach(n=>{
    rows.push([n.type,n.label,n.code||'',n.eg||'',n.status||'',n.bouwjaar||'',n.adres||'',n.fta_m||'',n.notitie||'']);
  });
  const csv='\uFEFF'+rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=(projectName||'export').replace(/[^a-z0-9]/gi,'_')+'.csv';a.click();
  toast('⬇ CSV geëxporteerd');
}

  showModal('Naar Fase 2 — Conditiemeting',

      <p>Je gaat naar <b>Fase 2 — Conditiemeting</b>.</p>

        💡 <b>Tip:</b> Sla eerst je decompositie op als JSON en laad deze in Fase 2. Alle beheerobjecten worden dan automatisch ingeladen.

    </div>`,

function autoSave(){
  try{localStorage.setItem('nen2767_v4',JSON.stringify({version:4,projectName,tree,idC}));}catch(e){}
}

// ═══════════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════════
function showModal(title,body,btns){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalBtns').innerHTML=btns.map(b=>`<button class="${b.c}">${esc(b.l)}</button>`).join('');
  document.getElementById('modalBtns').querySelectorAll('button').forEach((btn,i)=>btn.addEventListener('click',btns[i].cb));
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

//  TOAST
// ═══════════════════════════════════════════════════════════════
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3000);}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
function init(){
  initLib();
  // Restore session
  try{
    const s=localStorage.getItem('nen2767_v4');
    if(s){
      const d=JSON.parse(s);
      if(d.tree&&d.tree.length){
        tree=d.tree;idC=d.idC||idC;projectName=d.projectName||'Project';
        document.getElementById('projectName').textContent=projectName;
        toast('↩ Vorige sessie hersteld — '+projectName);
      }
    }
  }catch(e){}
  renderTree();
}
init();
</script>
