<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEN 2767 — Decompositie Bibliotheek</title>
<script src="mapping.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#f4f3ef;--sur:#fff;--sur2:#eeede8;--bdr:rgba(0,0,0,.10);--bdr2:rgba(0,0,0,.18);
  --tx:#1a1a18;--tx2:#5a5a56;--tx3:#9a9a94;
  --blue:#1a5fa8;--blue-l:#e8f1fb;--blue-d:#134e8a;
  --green:#0e6e50;--green-l:#e1f4ec;
  --amber:#b87200;--amber-l:#fdf0d8;
  --red:#a02828;--red-l:#fbeaea;
  --purple:#534AB7;--purple-l:#eeecfb;
  --r:6px;--rl:10px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#18181a;--sur:#232326;--sur2:#2c2c30;--bdr:rgba(255,255,255,.09);--bdr2:rgba(255,255,255,.18);
  --tx:#eeeee8;--tx2:#9a9a94;--tx3:#55554e;
  --blue-l:#0f3d7022;--green-l:#0a4a3522;--amber-l:#5a380022;--red-l:#4a101022;--purple-l:#2a267022;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{height:44px;background:var(--blue);color:#fff;display:flex;align-items:center;gap:6px;padding:0 12px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.topbar-title{font-size:13px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.topbar-sub{font-size:11px;opacity:.7;white-space:nowrap}
.topbar-sep{width:1px;height:20px;background:rgba(255,255,255,.25);margin:0 2px;flex-shrink:0}
.topbar-saved{font-size:11px;opacity:.65;white-space:nowrap;flex-shrink:0}
.topbar-actions{margin-left:auto;display:flex;gap:4px;flex-shrink:0}
.tbtn{padding:4px 9px;border:1px solid rgba(255,255,255,.3);border-radius:var(--r);font-size:11px;cursor:pointer;background:rgba(255,255,255,.1);color:#fff;font-family:inherit;transition:background .12s;white-space:nowrap}
.tbtn:hover{background:rgba(255,255,255,.22)}
.tbtn.accent{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.45);font-weight:600}
.tbtn:disabled{opacity:.4;cursor:default}

/* SEARCH BAR */
.searchbar{padding:5px 10px;background:var(--sur);border-bottom:1px solid var(--bdr);display:none;align-items:center;gap:8px;flex-shrink:0}
.searchbar.open{display:flex}
.sb-tree-input{flex:1;padding:5px 10px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:12px;background:var(--sur2);color:var(--tx);outline:none;font-family:inherit}
.sb-tree-input:focus{border-color:var(--blue)}
.sb-tree-count{font-size:11px;color:var(--tx3);white-space:nowrap}
.sb-tree-nav{display:flex;gap:3px}

/* LAYOUT */
.workspace{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
.sidebar{width:272px;min-width:200px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-head{padding:10px 12px 8px;border-bottom:1px solid var(--bdr)}
.sb-brand{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
.sb-search{width:100%;padding:5px 9px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:12px;background:var(--sur2);color:var(--tx);outline:none;font-family:inherit}
.sb-search:focus{border-color:var(--blue)}
.sb-tabs{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-bottom:1px solid var(--bdr)}
.sbtab{padding:7px 4px 5px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:2px solid transparent;transition:all .1s;font-family:inherit}
.sbtab:hover:not(.on){background:var(--sur2)}
.sbtab.on{border-bottom-color:var(--blue)}
.sbtab-icon{font-size:18px;line-height:1}
.sbtab-label{font-size:9px;font-weight:700;color:var(--tx2);letter-spacing:.3px}
.sbtab-count{font-size:9px;color:var(--tx3)}
.sbtab.on .sbtab-label{color:var(--blue)}
.sb-count{font-size:10px;color:var(--tx3);padding:4px 12px;border-bottom:1px solid var(--bdr)}
.sb-list{flex:1;overflow-y:auto;padding:5px}
.lib-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:var(--r);cursor:grab;font-size:12px;border:1px solid transparent;margin-bottom:2px;background:var(--sur2);user-select:none;transition:border-color .1s,background .1s}
.lib-item:hover{border-color:var(--bdr2);background:var(--sur)}
.lib-item.dragging{opacity:.35}
.lib-icon{font-size:15px;flex-shrink:0;width:22px;text-align:center}
.lib-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-code{font-size:10px;color:var(--tx3);font-family:monospace;background:var(--bg);padding:1px 5px;border-radius:20px;border:1px solid var(--bdr);flex-shrink:0}

/* CANVAS */
.canvas-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.canvas-head{padding:7px 12px;border-bottom:1px solid var(--bdr);background:var(--sur);display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap}
.canvas-title{font-size:12px;font-weight:600;flex:1;min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.canvas-title:hover{color:var(--blue)}
.btn{padding:4px 8px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:11px;cursor:pointer;background:var(--sur);color:var(--tx);font-family:inherit;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;transition:background .12s}
.btn:hover{background:var(--sur2)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:var(--blue-d)}
.btn.danger{color:var(--red);border-color:var(--red);background:var(--red-l)}
.btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.canvas{flex:1;overflow:auto;padding:14px}
#mapView{flex:1;display:none}
#mapView.show{display:block}

/* STATS BAR */
.statsbar{padding:4px 14px;background:var(--sur2);border-bottom:1px solid var(--bdr);display:none;gap:12px;font-size:11px;color:var(--tx2);flex-shrink:0;flex-wrap:wrap}
.statsbar.show{display:flex}
.stat-item{display:flex;align-items:center;gap:4px}
.stat-dot{width:7px;height:7px;border-radius:50%}

/* TREE */
.node-block{user-select:none}
.node-row{display:flex;align-items:stretch;margin-bottom:2px}
.node-indent{display:flex;flex-shrink:0}
.indent-pipe{width:20px;border-right:1px solid var(--bdr);margin-right:4px;flex-shrink:0}
.node-body{flex:1;display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:var(--r);border:1px solid transparent;background:var(--sur2);cursor:pointer;min-width:0;transition:border-color .1s,background .1s}
.node-body:hover{border-color:var(--bdr2)}
.node-body.sel{border-color:var(--blue)!important;background:var(--blue-l)!important}
.node-body.drop-ok{border-color:var(--blue)!important;background:var(--blue-l)!important;outline:2px dashed var(--blue);outline-offset:-2px}
.node-body.drop-no{border-color:var(--red)!important;background:var(--red-l)!important}
.node-body.search-match{border-color:var(--amber)!important;background:var(--amber-l)!important}
.node-body.search-current{border-color:var(--amber)!important;background:var(--amber)!important}
.node-body.search-current .node-label{color:#fff;font-weight:600}
.node-tog{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx2);border:1px solid var(--bdr);border-radius:3px;background:var(--sur);flex-shrink:0;cursor:pointer;font-family:monospace}
.node-tog:hover{background:var(--sur2)}
.node-icon{font-size:14px;flex-shrink:0}
.node-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.node-label{font-size:12px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-wcode{font-size:10px;color:var(--blue);font-family:monospace;flex-shrink:0;background:var(--blue-l);padding:1px 5px;border-radius:20px;border:1px solid rgba(26,95,168,.2)}
.node-nen{font-size:10px;color:var(--tx3);font-family:monospace;flex-shrink:0}
.node-count{font-size:10px;background:var(--sur);border:1px solid var(--bdr);color:var(--tx3);padding:0 4px;border-radius:20px;flex-shrink:0}
.node-badge{font-size:9px;padding:1px 5px;border-radius:20px;flex-shrink:0;border:1px solid}
.badge-ja{background:var(--green-l);color:var(--green);border-color:var(--green)}
.badge-opt{background:var(--amber-l);color:var(--amber);border-color:var(--amber)}
.node-status{font-size:9px;padding:1px 5px;border-radius:20px;flex-shrink:0;border:1px solid;font-weight:600}
.status-actief{background:var(--green-l);color:var(--green);border-color:var(--green)}
.status-onderhoud{background:var(--amber-l);color:var(--amber);border-color:var(--amber)}
.status-buiten{background:var(--red-l);color:var(--red);border-color:var(--red)}
.node-photo-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0}
.node-note-dot{width:6px;height:6px;border-radius:50%;background:var(--purple);flex-shrink:0}
.node-actions{display:flex;gap:2px;opacity:0;flex-shrink:0}
.node-body:hover .node-actions,.node-body.sel .node-actions{opacity:1}
.na{width:20px;height:20px;border:none;background:transparent;cursor:pointer;color:var(--tx2);font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:3px;flex-shrink:0}
.na:hover{background:var(--sur);color:var(--tx)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:10px;color:var(--tx2);text-align:center}

/* DETAIL PANEL */
.detail{width:292px;background:var(--sur);border-left:1px solid var(--bdr);overflow-y:auto;flex-shrink:0;display:none;flex-direction:column}
.detail.open{display:flex}
.dp-head{padding:10px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;flex-shrink:0;gap:8px}
.dp-type-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;color:#fff;flex-shrink:0}
.dp-title{font-size:12px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dp-body{overflow-y:auto;flex:1}
.dp-section{padding:10px 13px;border-bottom:1px solid var(--bdr)}
.dp-section:last-child{border-bottom:none}
.dp-section-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.dp-field{margin-bottom:7px}
.dp-field:last-child{margin-bottom:0}
.dp-label{font-size:10px;color:var(--tx3);margin-bottom:2px}
.dp-value{font-size:12px;line-height:1.5}
.dp-value.mono{font-family:monospace;font-size:11px}
.dp-value.muted{color:var(--tx2);font-size:11px}
.dp-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.belang-gering{background:#e8f4ec;color:#0e6e50;border:1px solid #0e6e5044}
.belang-serieus{background:#fdf0d8;color:#b87200;border:1px solid #b8720044}
.belang-ernstig{background:#fbeaea;color:#a02828;border:1px solid #a0282844}
.dp-input{width:100%;padding:5px 9px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:12px;background:var(--sur2);color:var(--tx);outline:none;font-family:inherit;margin-bottom:4px}
.dp-input:focus{border-color:var(--blue)}
.dp-input.mono{font-family:monospace;color:var(--blue)}
.dp-input.mono::placeholder{font-family:-apple-system,system-ui,sans-serif;color:var(--tx3);font-style:italic}
.dp-textarea{width:100%;padding:5px 9px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:12px;background:var(--sur2);color:var(--tx);outline:none;font-family:inherit;resize:vertical;min-height:64px;line-height:1.5}
.dp-textarea:focus{border-color:var(--blue)}
.dp-select{width:100%;padding:5px 9px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:12px;background:var(--sur2);color:var(--tx);outline:none;font-family:inherit}
.dp-select:focus{border-color:var(--blue)}
.dp-save-row{display:flex;gap:5px;margin-top:6px}
.dp-save-row .btn{flex:1;justify-content:center}

/* FOTO */
.photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:6px}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:var(--r);overflow:hidden;border:1px solid var(--bdr);background:var(--sur2);cursor:pointer}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .15s}
.photo-thumb:hover img{transform:scale(1.05)}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(160,40,40,.85);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.photo-thumb:hover .photo-del{display:flex}
.photo-add{aspect-ratio:1;border-radius:var(--r);border:2px dashed var(--bdr2);background:var(--sur2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;transition:all .12s;color:var(--tx3)}
.photo-add:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.photo-add-icon{font-size:20px}
.photo-add-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:2000;cursor:zoom-out}
.lightbox img{max-width:90vw;max-height:88vh;border-radius:var(--r);box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;opacity:.8}
.lightbox-close:hover{opacity:1}
.lightbox-caption{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.8);font-size:12px;background:rgba(0,0,0,.5);padding:4px 12px;border-radius:20px;white-space:nowrap;max-width:80vw;overflow:hidden;text-overflow:ellipsis}

/* MAP */
.popup-title{font-weight:700;font-size:13px;margin-bottom:4px}
.popup-code{font-family:monospace;font-size:10px;color:#666;margin-bottom:2px}
.popup-addr{font-size:11px;color:#555;margin-bottom:2px}
.popup-wcode{font-size:11px;color:#1a5fa8;font-family:monospace}

/* FILTER */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000}
.fbox{background:var(--sur);border-radius:var(--rl);padding:20px;width:360px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.fbox h3{font-size:14px;font-weight:600;margin-bottom:5px}
.fbox p{font-size:12px;color:var(--tx2);margin-bottom:14px;line-height:1.5}
.fopts{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.fopt{display:flex;align-items:center;gap:12px;padding:10px 13px;border:2px solid var(--bdr);border-radius:var(--r);cursor:pointer;transition:all .12s}
.fopt:hover{border-color:var(--bdr2)}
.fopt.sel{border-color:var(--blue);background:var(--blue-l)}
.fopt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.fopt-lbl{font-size:12px;font-weight:600}
.fopt-sub{font-size:11px;color:var(--tx2);margin-top:1px}

/* MODAL */
.mbox{background:var(--sur);border-radius:var(--rl);padding:18px;width:420px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.mbox h3{font-size:14px;font-weight:600;margin-bottom:14px}
.form-row{margin-bottom:9px}
.form-row label{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:6px 9px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:12px;background:var(--sur2);color:var(--tx);outline:none;font-family:inherit}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--blue)}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* UNDO indicator */
.undo-hint{font-size:10px;color:rgba(255,255,255,.55);white-space:nowrap}

/* TOAST */
.toast{position:fixed;bottom:16px;right:16px;background:var(--tx);color:var(--bg);padding:8px 14px;border-radius:var(--r);font-size:12px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;max-width:320px}
.toast.show{opacity:1}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">NEN 2767</span>
  <span class="topbar-sub">Fase 1 — Decompositie</span>
  <div class="topbar-sep"></div>
  <span class="topbar-saved" id="topSaved"></span>
  <div class="topbar-actions">
    <button class="tbtn" onclick="newProject()">＋ Nieuw</button>
    <button class="tbtn" onclick="saveJSON()">💾 Opslaan</button>
    <button class="tbtn" onclick="document.getElementById('loadFile').click()">📂 Laden</button>
    <input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadJSON(this)">
    <button class="tbtn" onclick="exportCSV()">⬇ CSV</button>
    <button class="tbtn" onclick="exportPDF()">📄 PDF</button>
    <button class="tbtn" id="mapToggleBtn" onclick="toggleMapView()">🗺 Kaart</button>
    <button class="tbtn" id="undoBtn" onclick="undo()" title="Ongedaan maken (Ctrl+Z)" disabled>↩ Ongedaan</button>
    <div class="topbar-sep"></div>
    <button class="tbtn" onclick="goToFase2()" title="Ga naar Fase 2 — Conditiemeting" style="background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.55);font-weight:700;display:flex;align-items:center;gap:5px">
      📋 Fase 2 <span style="font-size:9px;opacity:.8;font-weight:400">Conditiemeting →</span>
    </button>
    <button class="tbtn accent" onclick="clearAll()">🗑 Leegmaken</button>
  </div>
</div>

<!-- TREE SEARCH BAR -->
<div class="searchbar" id="searchBar">
  <span style="font-size:12px;color:var(--tx2);flex-shrink:0">🔍</span>
  <input class="sb-tree-input" id="treeSearchInput" placeholder="Zoeken in decompositie…" oninput="doTreeSearch()" autocomplete="off">
  <span class="sb-tree-count" id="treeSearchCount"></span>
  <div class="sb-tree-nav">
    <button class="btn" onclick="searchNav(-1)" title="Vorige">↑</button>
    <button class="btn" onclick="searchNav(1)" title="Volgende">↓</button>
  </div>
  <button class="btn" onclick="closeTreeSearch()">✕</button>
</div>

<!-- STATS BAR -->
<div class="statsbar" id="statsBar"></div>

<div class="workspace">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-brand">NEN 2767 Bibliotheek</div>
      <input class="sb-search" id="sbSearch" type="text" placeholder="Zoeken op naam of code…" oninput="renderLib()" autocomplete="off">
    </div>
    <div class="sb-tabs">
      <button class="sbtab on" id="tab-bo" onclick="setTab('bo')">
        <span class="sbtab-icon">🏗</span><span class="sbtab-label">Objecten</span><span class="sbtab-count">64</span>
      </button>
      <button class="sbtab" id="tab-el" onclick="setTab('el')">
        <span class="sbtab-icon">🔧</span><span class="sbtab-label">Elementen</span><span class="sbtab-count">245</span>
      </button>
      <button class="sbtab" id="tab-bd" onclick="setTab('bd')">
        <span class="sbtab-icon">🧱</span><span class="sbtab-label">Bouwdelen</span><span class="sbtab-count">760</span>
      </button>
      <button class="sbtab" id="tab-gb" onclick="setTab('gb')">
        <span class="sbtab-icon">⚠️</span><span class="sbtab-label">Gebreken</span><span class="sbtab-count">166</span>
      </button>
    </div>
    <div class="sb-count" id="sbCount"></div>
    <div class="sb-list" id="sbList"></div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap">
    <div class="canvas-head">
      <span class="canvas-title" id="projectTitle" onclick="renameProject()" title="Klik om naam te wijzigen">Nieuw project</span>
      <button class="btn" onclick="addAreaal()">＋ Areaal</button>
      <button class="btn" id="searchToggleBtn" onclick="toggleTreeSearch()">🔍</button>
      <button class="btn" onclick="expandAll()">↕ Uit</button>
      <button class="btn" onclick="collapseAll()">↕ In</button>

</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
//  BO ICONS & COLORS
// ══════════════════════════════════════════════════════════
const BO_ICONS={'Aanleginrichting':'⚓','Aquaduct':'🌉','Begraafplaats':'🪦','Beheerobject Overstijgende Voorziening':'🏢','Beluchtingstank':'💨','Bezinkbassin':'🪣','Bosgebied':'🌲','Brug (beweegbaar)':'🏗','Brug (vast)':'🌁','Bunker':'🏰','Coupure':'🚧','Dam':'🏞','Dijk':'🛡','Drinkwaterinlaat':'🚰','Duiker':'🔵','Duingebied':'🏖','Ecoduct':'🦌','Faunatunnel':'🦊','Gemaal':'⚙️','Gistingstank':'🧪','Grondkering':'🪨','Haven':'⚓','Hevel':'🌊','Individuele Behandeling van Afvalwater systeem (IBA-systeem)':'♻️','Infragebonden gebouw':'🏭','Kabel en leiding':'🔌','Kade':'🚢','Kanaal':'🛶','Keersluis':'🚪','Landbouwgebied':'🌾','Meer':'🏞','Natuurgebied':'🌿','Onderdoorgang':'🚇','Ontvangst- en verdeelwerk':'🏭','Open tunnelbak':'🚇','Opslagtank':'🛢','Overkluizing':'🌉','Park':'🌳','Persleiding':'🔩','Procesbassin':'🧫','Recreatief gebied':'🎯','Riolering':'🕳','Rivier':'🌊','Schutsluis':'🚪','Sifon':'〰️','Spoorweg':'🚆','Sport- en spelvoorziening':'⚽','Spuisluis':'🚪','Stormvloedkering':'🌊','Stuw':'🌊','Terrein':'🟫','Tunnel':'🚇','Uiterwaard':'🌾','Verkeerscentrale':'🎛','Verzorgingsplaats':'🛣','Viaduct':'🌉','Water en watergang (lijnvormig), overig':'〰️','Water en watergang (niet lijnvormig), overig':'💧','Waterbuffer':'💧','Waterreguleringswerk':'🔧','Weg':'🛣','Windmolen':'🌬','Zandfilterbassin':'🪨','Zee':'🌊'};
const BO_COLORS={'Gemaal':'#1a5fa8','Brug (beweegbaar)':'#b87200','Brug (vast)':'#b87200','Dijk':'#0e6e50','Stuw':'#0e6e50','Keersluis':'#0e6e50','Schutsluis':'#0e6e50','Tunnel':'#534AB7','Viaduct':'#534AB7','Aquaduct':'#534AB7','Riolering':'#5B8C5A','Kanaal':'#2e86cc','Rivier':'#2e86cc','Meer':'#2e86cc','Zee':'#2e86cc','Weg':'#cc3a3a','Spoorweg':'#cc3a3a'};
const boIcon=n=>BO_ICONS[n]||'🏗';
const boColor=n=>BO_COLORS[n]||'#1a5fa8';

// ══════════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════════
const LBL={areaal:'Areaal',complex:'Complex',bo:'Beheerobject',eg:'Elementengroep',el:'Element',sy:'Systeem',bd:'Bouwdeel',gb:'Gebrek'};
const COL={areaal:'#534AB7',complex:'#1a5fa8',bo:'#2e86cc',eg:'#0e6e50',el:'#1aaa70',sy:'#5B8C5A',bd:'#b87200',gb:'#cc3a3a'};
const KIDS={areaal:['complex'],complex:['bo'],bo:['eg'],eg:['el'],el:['sy'],sy:['bd'],bd:['gb'],gb:[]};
const WCODE_LEVELS=new Set(['areaal','complex','bo','el','bd']);
const PHOTO_LEVELS=new Set(['bo','el','bd','gb']);
const MAX_PHOTOS=5,MAX_PX=800,JPEG_Q=0.78;
const MAX_UNDO=10;

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let tree=[],idC=1,projectName='Nieuw project';
let selId=null,coll={},libTab='bo';
let dragLib=null,dragNid=null;
let filterPending=null,filterChoice='ja';
let mapVisible=false,leafletMap=null,mapMarkers=[];
let undoStack=[],redoStack=[];
let treeSearchMatches=[],treeSearchIdx=-1;

const mkId=()=>'n'+(idC++);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const deepCopy=o=>JSON.parse(JSON.stringify(o));

// ══════════════════════════════════════════════════════════
//  UNDO / REDO
// ══════════════════════════════════════════════════════════
function pushUndo(){
  undoStack.push(deepCopy({tree,idC}));
  if(undoStack.length>MAX_UNDO)undoStack.shift();
  redoStack=[];
  document.getElementById('undoBtn').disabled=false;
}
function undo(){
  if(!undoStack.length)return;
  redoStack.push(deepCopy({tree,idC}));
  const s=undoStack.pop();
  tree=s.tree;idC=s.idC;
  document.getElementById('undoBtn').disabled=undoStack.length===0;
  renderTree();autoSave();toast('↩ Ongedaan gemaakt ('+undoStack.length+' stap'+(undoStack.length!==1?'pen':'')+' over)');
}
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();toggleTreeSearch();}
  if(e.key==='Escape'){closeTreeSearch();closeLightbox();}
});

// ══════════════════════════════════════════════════════════
//  TREE HELPERS
// ══════════════════════════════════════════════════════════
function findN(id,ns=tree){for(const n of ns){if(n.id===id)return n;if(n.children){const r=findN(id,n.children);if(r)return r;}}return null;}
function findP(id,ns=tree,p=null){for(const n of ns){if(n.id===id)return p;if(n.children){const r=findP(id,n.children,n);if(r)return r;}}return null;}
function addKid(p,c){if(!p.children)p.children=[];p.children.push(c);}
function findFirst(type,ns=tree){for(const n of ns){if(n.type===type)return n;if(n.children){const r=findFirst(type,n.children);if(r)return r;}}return null;}
function findAll(type,ns=tree,res=[]){for(const n of ns){if(n.type===type)res.push(n);if(n.children)findAll(type,n.children,res);}return res;}
function countAll(ns=tree){let t=0;for(const n of ns){t++;if(n.children)t+=countAll(n.children);}return t;}
function nenCode(type,name){
  if(type==='bo')return BO.find(x=>x.n===name)?.c||'';
  if(type==='el')return EL.find(x=>x.n===name)?.c||'';
  if(type==='bd')return BD.find(x=>x.n===name)?.c||'';
  if(type==='gb')return GB.find(x=>x.n===name)?.c||'';
  return '';
}

// ══════════════════════════════════════════════════════════
//  BUILD BO TREE
// ══════════════════════════════════════════════════════════
function buildBoTree(boName,filter='ja'){
  const bo=BO.find(x=>x.n===boName);
  const boNode={id:mkId(),type:'bo',label:boName,nenCode:bo?.c||'',def:bo?.d||'',
    wcode:'',adres:'',stad:'',lat:'',lon:'',status:'actief',bouwjaar:'',levensduur:'',notitie:'',photos:[],children:[]};
  const allowed=filter==='ja'?['ja']:filter==='ja_opt'?['ja','optioneel']:['ja','optioneel','nee'];
  const elRows=(MAP_BO_EL[boName]||[]).filter(r=>allowed.includes(r.m));
  const egMap={};
  for(const r of elRows)(egMap[r.eg]=egMap[r.eg]||[]).push(r);
  for(const[egName,rows]of Object.entries(egMap)){
    const egNode={id:mkId(),type:'eg',label:egName,nenCode:'',wcode:'',notitie:'',children:[]};
    for(const r of rows){
      const el=EL.find(x=>x.n===r.el);
      const elNode={id:mkId(),type:'el',label:r.el,nenCode:el?.c||'',def:el?.f||'',
        vakdiscipline:el?.v||'',reden:el?.r||'',meenemen:r.m,functie:r.f,wcode:'',notitie:'',photos:[],children:[]};
      const bdRows=MAP_EL_BD[r.el]||[];
      const syMap={};
      for(const br of bdRows)(syMap[br.sy]=syMap[br.sy]||[]).push(br);
      for(const[syName,brows]of Object.entries(syMap)){
        const syNode={id:mkId(),type:'sy',label:syName,nenCode:'',wcode:'',notitie:'',children:[]};
        for(const br of brows){
          const bd=BD.find(x=>x.n===br.bd);
          const bdNode={id:mkId(),type:'bd',label:br.bd,nenCode:bd?.c||'',def:bd?.d||'',
            functie:br.f,wcode:'',notitie:'',photos:[],children:[]};
          for(const gr of(MAP_BD_GB[br.bd]||[])){
            const gb=GB.find(x=>x.n===gr.gb);
            bdNode.children.push({id:mkId(),type:'gb',label:gr.gb,nenCode:gb?.c||'',
              gebrekgroep:gr.gg,gebreksoort:gr.s,belang:gb?.b||'',
              omschrijving:gb?.o||'',eenheid:gb?.e||'',type_gb:gb?.t||'',
              afkorting:gb?.a||'',toelichting:gb?.l||'',intensiteit:gb?.i||'',
              wcode:'',notitie:'',photos:[],children:[]});
          }
          syNode.children.push(bdNode);
        }
        elNode.children.push(syNode);
      }
      egNode.children.push(elNode);
    }
    boNode.children.push(egNode);
  }
  return boNode;
}
function countEls(boName,f){const rows=MAP_BO_EL[boName]||[];if(f==='ja')return rows.filter(r=>r.m==='ja').length;if(f==='ja_opt')return rows.filter(r=>r.m==='ja'||r.m==='optioneel').length;return rows.length;}

// ══════════════════════════════════════════════════════════
//  FILTER DIALOG
// ══════════════════════════════════════════════════════════
function showFilter(boName,target){
  filterPending={boName,target};filterChoice='ja';
  document.getElementById('filterTitle').textContent=boName+' toevoegen';
  document.getElementById('fcnt-ja').textContent=countEls(boName,'ja')+' elementen (alleen kritisch)';
  document.getElementById('fcnt-ja_opt').textContent=countEls(boName,'ja_opt')+' elementen (kritisch + optioneel)';
  document.getElementById('fcnt-all').textContent=countEls(boName,'all')+' elementen (alles)';
  selFilter('ja');document.getElementById('filterDlg').style.display='flex';
}
function selFilter(f){filterChoice=f;['ja','ja_opt','all'].forEach(x=>document.getElementById('fopt-'+x).classList.toggle('sel',x===f));}
function cancelFilter(){document.getElementById('filterDlg').style.display='none';filterPending=null;}
function confirmFilter(){
  if(!filterPending)return;
  const{boName,target}=filterPending;
  pushUndo();
  const node=buildBoTree(boName,filterChoice);
  addKid(target,node);coll[target.id]=false;
  renderTree();autoSave();toast('✓ '+boName+' — '+countEls(boName,filterChoice)+' elementen ('+filterChoice+')');
  document.getElementById('filterDlg').style.display='none';filterPending=null;
}

// ══════════════════════════════════════════════════════════
//  LIBRARY
// ══════════════════════════════════════════════════════════
function setTab(t){libTab=t;['bo','el','bd','gb'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('on',x===t));renderLib();}
function renderLib(){
  const q=document.getElementById('sbSearch').value.toLowerCase().trim();
  const arr=libTab==='bo'?BO:libTab==='el'?EL:libTab==='bd'?BD:GB;
  const items=q?arr.filter(x=>x.n.toLowerCase().includes(q)||(x.c||'').toLowerCase().includes(q)):arr;
  document.getElementById('sbCount').textContent=items.length+' van '+arr.length+' items';
  const list=document.getElementById('sbList');
  list.innerHTML=items.map(i=>{
    const icon=libTab==='bo'?boIcon(i.n):libTab==='el'?'🔧':libTab==='bd'?'🧱':'⚠️';
    return `<div class="lib-item" draggable="true" data-type="${libTab}" data-name="${esc(i.n)}" title="${esc(i.n)}${i.d?' — '+i.d:''}">
      <span class="lib-icon">${icon}</span><span class="lib-name">${esc(i.n)}</span><span class="lib-code">${esc(i.c||'')}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.lib-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{if(dragNid){e.preventDefault();return;}dragLib={type:e.currentTarget.dataset.type,name:e.currentTarget.dataset.name};e.dataTransfer.effectAllowed='copy';e.dataTransfer.setData('text/plain',JSON.stringify(dragLib));setTimeout(()=>e.currentTarget.classList.add('dragging'),0);});
    el.addEventListener('dragend',e=>{e.currentTarget.classList.remove('dragging');setTimeout(()=>{dragLib=null;},50);});
    el.addEventListener('dblclick',e=>quickInsert(e.currentTarget.dataset.type,e.currentTarget.dataset.name));
  });
}
function quickInsert(type,name){
  if(!tree.length){toast('Maak eerst een Areaal aan');return;}
  const PARENT={complex:'areaal',bo:'complex',eg:'bo',el:'eg',sy:'el',bd:'sy',gb:'bd'};
  if(type==='bo'){const cplx=findFirst('complex');if(!cplx){toast('Voeg eerst een Complex toe');return;}showFilter(name,cplx);return;}
  const par=findFirst(PARENT[type]);if(!par){toast('Geen '+LBL[PARENT[type]]+' gevonden');return;}
  pushUndo();
  addKid(par,{id:mkId(),type,label:name,nenCode:nenCode(type,name),wcode:'',notitie:'',photos:[],children:[]});
  coll[par.id]=false;renderTree();autoSave();toast(name+' toegevoegd');
}

// ══════════════════════════════════════════════════════════
//  TREE SEARCH
// ══════════════════════════════════════════════════════════
function toggleTreeSearch(){
  const bar=document.getElementById('searchBar');
  const open=bar.classList.toggle('open');
  document.getElementById('searchToggleBtn').classList.toggle('active',open);
  if(open)setTimeout(()=>document.getElementById('treeSearchInput').focus(),50);
  else{clearTreeSearch();}
}
function closeTreeSearch(){
  document.getElementById('searchBar').classList.remove('open');
  document.getElementById('searchToggleBtn').classList.remove('active');
  clearTreeSearch();
}
function clearTreeSearch(){
  treeSearchMatches=[];treeSearchIdx=-1;
  document.getElementById('treeSearchInput').value='';
  document.getElementById('treeSearchCount').textContent='';
  renderTree();
}
function doTreeSearch(){
  const q=document.getElementById('treeSearchInput').value.toLowerCase().trim();
  treeSearchMatches=[];treeSearchIdx=-1;
  if(q){
    function walk(n){if(n.label.toLowerCase().includes(q)||((n.nenCode||'').toLowerCase().includes(q))||((n.wcode||'').toLowerCase().includes(q)))treeSearchMatches.push(n.id);if(n.children)n.children.forEach(walk);}
    tree.forEach(walk);
  }
  document.getElementById('treeSearchCount').textContent=treeSearchMatches.length?`${treeSearchMatches.length} gevonden`:(q?'Niets gevonden':'');
  if(treeSearchMatches.length){treeSearchIdx=0;scrollToMatch();}
  renderTree();
}
function searchNav(dir){
  if(!treeSearchMatches.length)return;
  treeSearchIdx=(treeSearchIdx+dir+treeSearchMatches.length)%treeSearchMatches.length;
  scrollToMatch();renderTree();
}
function scrollToMatch(){
  const id=treeSearchMatches[treeSearchIdx];
  // Expand path to match
  function expandPath(id,ns=tree){for(const n of ns){if(n.id===id){coll[n.id]=false;return true;}if(n.children&&expandPath(id,n.children)){coll[n.id]=false;return true;}}return false;}
  expandPath(id);
  renderTree();
  setTimeout(()=>{const el=document.getElementById('nb-'+id);if(el)el.scrollIntoView({block:'center',behavior:'smooth'});},50);
}

// ══════════════════════════════════════════════════════════
//  STATS
// ══════════════════════════════════════════════════════════
let statsVisible=false;
function toggleStats(){
  statsVisible=!statsVisible;
  document.getElementById('statsToggleBtn').classList.toggle('active',statsVisible);
  renderStats();
}
function renderStats(){
  const bar=document.getElementById('statsBar');
  if(!statsVisible||!tree.length){bar.classList.remove('show');return;}
  const bos=findAll('bo'),els=findAll('el'),bds=findAll('bd'),gbs=findAll('gb');
  const withPhotos=[...bos,...els,...bds,...gbs].filter(n=>n.photos?.length).length;
  const withCoords=bos.filter(n=>n.lat&&n.lon).length;
  const statusCount={actief:0,onderhoud:0,buiten:0};
  bos.forEach(n=>{if(n.status)statusCount[n.status.replace(' ','')]=(statusCount[n.status]||0)+1;});
  bar.classList.add('show');
  bar.innerHTML=`
    <span class="stat-item"><span class="stat-dot" style="background:${COL.bo}"></span><b>${bos.length}</b> beheerobjecten</span>
    <span class="stat-item"><span class="stat-dot" style="background:${COL.el}"></span><b>${els.length}</b> elementen</span>
    <span class="stat-item"><span class="stat-dot" style="background:${COL.bd}"></span><b>${bds.length}</b> bouwdelen</span>
    <span class="stat-item"><span class="stat-dot" style="background:${COL.gb}"></span><b>${gbs.length}</b> gebreken</span>
    <span class="stat-item">📷 <b>${withPhotos}</b> met foto's</span>
    <span class="stat-item">🗺 <b>${withCoords}</b> met coördinaten</span>
    <span class="stat-item">🟢 <b>${bos.filter(n=>n.status==='actief').length}</b> actief</span>
    <span class="stat-item">🟡 <b>${bos.filter(n=>n.status==='onderhoud').length}</b> in onderhoud</span>
    <span class="stat-item">🔴 <b>${bos.filter(n=>n.status==='buiten').length}</b> buiten gebruik</span>`;
}

// ══════════════════════════════════════════════════════════
//  RENDER TREE
// ══════════════════════════════════════════════════════════
function renderTree(){
  const root=document.getElementById('treeRoot');
  if(!tree.length){
    root.innerHTML=`<div class="empty">
      <div style="font-size:48px;opacity:.15">🏗</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:6px">Nog geen decompositie</div>
      <div style="font-size:12px;color:var(--tx3);max-width:280px;line-height:1.6">Klik <b>+ Areaal</b> of sleep een Beheerobject vanuit de bibliotheek.</div>
    </div>`;
    renderStats();return;
  }
  root.innerHTML=tree.map(n=>renderNode(n,0)).join('');
  attachEvents();
  renderStats();
  document.getElementById('mapViewBtn').style.display=findAll('bo').length?'':'none';
}

function renderNode(node,depth){
  const col=COL[node.type]||'#888';
  const hasKids=node.children?.length>0;
  const collapsed=!!coll[node.id];
  const isSearchMatch=treeSearchMatches.includes(node.id);
  const isSearchCurrent=treeSearchMatches[treeSearchIdx]===node.id;
  const pipes=Array.from({length:depth},()=>`<div class="indent-pipe"></div>`).join('');
  const icon=node.type==='bo'?`<span class="node-icon">${boIcon(node.label)}</span>`:`<div class="node-dot" style="background:${col}"></div>`;
  const wcHtml=node.wcode?`<span class="node-wcode">${esc(node.wcode)}</span>`:'';
  const nenHtml=node.nenCode?`<span class="node-nen">${esc(node.nenCode)}</span>`:'';
  let badge='';
  if(node.meenemen==='ja')badge=`<span class="node-badge badge-ja">ja</span>`;
  else if(node.meenemen==='optioneel')badge=`<span class="node-badge badge-opt">opt</span>`;
  // Status badge for BO
  let statusHtml='';
  if(node.type==='bo'&&node.status&&node.status!=='actief'){
    const sc=node.status==='onderhoud'?'onderhoud':node.status==='buiten gebruik'?'buiten':'';
    if(sc)statusHtml=`<span class="node-status status-${sc}">${node.status}</span>`;
  }
  const photoDot=node.photos?.length?`<span class="node-photo-dot" title="${node.photos.length} foto('s)"></span>`:'';
  const noteDot=node.notitie?`<span class="node-note-dot" title="Notitie aanwezig"></span>`:'';
  const selCls=selId===node.id?' sel':'';
  const searchCls=isSearchCurrent?' search-current':isSearchMatch?' search-match':'';
  const canAdd=(KIDS[node.type]||[]).length>0;
  const canDup=node.type!=='areaal';
  return `<div class="node-block" id="blk-${node.id}">
    <div class="node-row">
      <div class="node-indent">${pipes}</div>
      <div class="node-body${selCls}${searchCls}" id="nb-${node.id}" data-id="${node.id}" data-type="${node.type}" draggable="true">
        ${hasKids?`<span class="node-tog" data-tog="${node.id}">${collapsed?'+':'−'}</span>`:`<span style="width:16px;flex-shrink:0"></span>`}

function attachEvents(){
  document.querySelectorAll('[data-tog]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();coll[el.dataset.tog]=!coll[el.dataset.tog];renderTree();}));
  document.querySelectorAll('.node-body').forEach(el=>{
    el.addEventListener('click',e=>{if(e.target.closest('[data-act]')||e.target.closest('[data-tog]'))return;showDetail(el.dataset.id);});
  });
  document.querySelectorAll('[data-act]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();const{id,act}=el.dataset;
    if(act==='add')openAddChild(id);if(act==='ren')openRename(id);
    if(act==='del')deleteNode(id);if(act==='up')moveNode(id,-1);if(act==='dn')moveNode(id,1);
    if(act==='dup')duplicateNode(id);
  }));
  document.querySelectorAll('.node-body').forEach(el=>{
    el.addEventListener('dragstart',e=>{if(dragLib){e.preventDefault();return;}dragNid=el.dataset.id;dragLib=null;e.dataTransfer.effectAllowed='move';setTimeout(()=>el.classList.add('dragging'),0);});
    el.addEventListener('dragend',()=>{document.querySelectorAll('.node-body.dragging,.node-body.drop-ok,.node-body.drop-no').forEach(x=>x.classList.remove('dragging','drop-ok','drop-no'));dragNid=null;});
    el.addEventListener('dragover',e=>{
      e.preventDefault();e.stopPropagation();e.dataTransfer.dropEffect=dragLib?'copy':'move';
      document.querySelectorAll('.node-body.drop-ok,.node-body.drop-no').forEach(x=>x.classList.remove('drop-ok','drop-no'));
      const tt=el.dataset.type;
      if(dragLib){const ok=(dragLib.type==='bo'&&tt==='complex')||(KIDS[tt]||[]).includes(dragLib.type);el.classList.add(ok?'drop-ok':'drop-no');}
      else if(dragNid&&dragNid!==el.dataset.id){const n=findN(dragNid);el.classList.add((KIDS[tt]||[]).includes(n?.type)?'drop-ok':'drop-no');}
    });
    el.addEventListener('dragleave',e=>{if(!el.contains(e.relatedTarget))el.classList.remove('drop-ok','drop-no');});
    el.addEventListener('drop',e=>{
      e.preventDefault();e.stopPropagation();el.classList.remove('drop-ok','drop-no');
      const tnode=findN(el.dataset.id);if(!tnode)return;
      if(dragLib){
        const{type,name}=dragLib;
        if(type==='bo'&&tnode.type==='complex')showFilter(name,tnode);
        else if((KIDS[tnode.type]||[]).includes(type)){pushUndo();addKid(tnode,{id:mkId(),type,label:name,nenCode:nenCode(type,name),wcode:'',notitie:'',photos:[],children:[]});coll[tnode.id]=false;renderTree();autoSave();toast(name+' toegevoegd');}
        else toast('⚠ '+LBL[type]+' past niet onder '+LBL[tnode.type]);
      }else if(dragNid&&dragNid!==tnode.id){
        const n=findN(dragNid);if(!n)return;
        if(!(KIDS[tnode.type]||[]).includes(n.type)){toast('⚠ Kan hier niet plaatsen');return;}
        pushUndo();const op=findP(dragNid);
        if(op)op.children=op.children.filter(c=>c.id!==dragNid);else tree=tree.filter(x=>x.id!==dragNid);
        addKid(tnode,n);coll[tnode.id]=false;renderTree();autoSave();toast(n.label+' verplaatst');
      }
    });
  });
}
function canvasDrop(e){if(e.target.closest('.node-body'))return;e.preventDefault();if(dragLib&&dragLib.type==='areaal'){pushUndo();tree.push({id:mkId(),type:'areaal',label:dragLib.name||'Areaal',nenCode:'',wcode:'',notitie:'',children:[]});renderTree();autoSave();}}

function duplicateNode(id){
  const n=findN(id);if(!n)return;
  pushUndo();
  function cloneNode(src){
    const clone=deepCopy(src);
    function reId(nd){nd.id=mkId();if(nd.children)nd.children.forEach(reId);}
    reId(clone);
    clone.label=clone.label+' (kopie)';
    return clone;
  }
  const clone=cloneNode(n);
  const par=findP(id);const list=par?par.children:tree;
  const idx=list.findIndex(x=>x.id===id);
  list.splice(idx+1,0,clone);
  renderTree();autoSave();toast('⧉ '+n.label+' gedupliceerd');
}

function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>MAX_PX||h>MAX_PX){if(w>h){h=Math.round(h*MAX_PX/w);w=MAX_PX;}else{w=Math.round(w*MAX_PX/h);h=MAX_PX;}}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve({data:c.toDataURL('image/jpeg',JPEG_Q),name:file.name,w,h});
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  });
}
async function addPhotos(e,nodeId){
  const n=findN(nodeId);if(!n)return;
  if(!n.photos)n.photos=[];
  const files=Array.from(e.target.files);
  const slots=MAX_PHOTOS-n.photos.length;
  if(!slots){toast('⚠ Maximum van '+MAX_PHOTOS+' foto\'s bereikt');return;}
  const toAdd=files.slice(0,slots);
  toast('📷 Foto\'s verwerken…');
  for(const f of toAdd){const c=await compressImage(f);n.photos.push(c);}
  if(files.length>slots)toast(`⚠ ${slots} van ${files.length} foto('s) toegevoegd (max ${MAX_PHOTOS})`);
  else toast(`✓ ${toAdd.length} foto('s) toegevoegd`);
  autoSave();showDetail(nodeId);
}

  e.stopPropagation();const n=findN(nodeId);if(!n?.photos)return;
  pushUndo();n.photos.splice(idx,1);autoSave();renderTree();showDetail(nodeId);toast('Foto verwijderd');

function toggleMapView(){
  mapVisible=!mapVisible;
  document.getElementById('canvas').style.display=mapVisible?'none':'';
  document.getElementById('mapView').classList.toggle('show',mapVisible);
  document.getElementById('mapViewBtn').classList.toggle('active',mapVisible);
  if(mapVisible)renderMap();
}
function renderMap(){
  const mapEl=document.getElementById('mapView');
  if(!leafletMap){
    mapEl.style.height='100%';
    leafletMap=L.map(mapEl).setView([52.3,5.3],8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19}).addTo(leafletMap);
  }
  mapMarkers.forEach(m=>m.remove());mapMarkers=[];
  const bos=findAll('bo');const bounds=[];
  for(const bo of bos){
    const lat=parseFloat(bo.lat),lon=parseFloat(bo.lon);
    if(!bo.lat||!bo.lon||isNaN(lat)||isNaN(lon))continue;
    const color=boColor(bo.label),icon=boIcon(bo.label);
    const divIcon=L.divIcon({className:'',html:`<div style="background:${color};border:2px solid #fff;border-radius:50% 50% 50% 0;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 8px rgba(0,0,0,.35);transform:rotate(-45deg);cursor:pointer"><span style="transform:rotate(45deg)">${icon}</span></div>`,iconSize:[34,34],iconAnchor:[17,34],popupAnchor:[0,-36]});
    const adresStr=[bo.adres,bo.stad].filter(Boolean).join(', ');
    const statusIcon=bo.status==='onderhoud'?'🟡':bo.status==='buiten gebruik'?'🔴':'🟢';
    const popup=`<div class="popup-title">${icon} ${bo.label}</div>
      ${bo.nenCode?`<div class="popup-code">NEN: ${bo.nenCode}</div>`:''}
      ${adresStr?`<div class="popup-addr">📍 ${adresStr}</div>`:''}
      ${bo.wcode?`<div class="popup-wcode">⚙ ${bo.wcode}</div>`:''}
      ${bo.bouwjaar?`<div style="font-size:11px;color:#555">🏗 Bouwjaar: ${bo.bouwjaar}${bo.levensduur?' ('+bo.levensduur+'jr)':''}</div>`:''}
      <div style="font-size:11px;margin-top:4px">${statusIcon} ${bo.status||'actief'}</div>
      <div style="font-size:10px;color:#999;margin-top:3px">${lat.toFixed(5)}, ${lon.toFixed(5)}</div>`;
    const marker=L.marker([lat,lon],{icon:divIcon}).addTo(leafletMap).bindPopup(popup);
    mapMarkers.push(marker);bounds.push([lat,lon]);
  }
  if(bounds.length===1)leafletMap.setView(bounds[0],14);
  else if(bounds.length>1)leafletMap.fitBounds(bounds,{padding:[40,40]});
  if(!bounds.length)toast('⚠ Geen coördinaten. Voeg lat/lon toe via het detail paneel.');
  else toast(`🗺 ${bounds.length} object${bounds.length>1?'en':''} op kaart`);
  setTimeout(()=>leafletMap.invalidateSize(),100);
}

  let rows='';
  function walk(n,depth){
    const indent='&nbsp;'.repeat(depth*4);
    const col=COL[n.type]||'#888';
    const icon=n.type==='bo'?boIcon(n.label):'';
    const wc=n.wcode?` <span style="color:#1a5fa8;font-family:monospace;font-size:11px">[${n.wcode}]</span>`:'';
    const nc=n.nenCode?` <span style="color:#999;font-size:10px;font-family:monospace">${n.nenCode}</span>`:'';
    const st=n.status&&n.status!=='actief'?` <span style="font-size:10px;color:${n.status==='onderhoud'?'#b87200':'#a02828'}">(${n.status})</span>`:'';
    const nt=n.notitie?`<div style="margin-left:${(depth+1)*20}px;font-size:11px;color:#666;font-style:italic;margin-bottom:2px">📝 ${n.notitie}</div>`:'';
    rows+=`<tr>
      <td style="padding:3px 6px;border-bottom:1px solid #eee">
        ${indent}<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col};margin-right:5px;vertical-align:middle"></span>
        ${icon?`<span style="font-size:13px;margin-right:3px">${icon}</span>`:''}
        <strong style="font-size:${12-Math.min(depth,3)}px">${n.label}</strong>${wc}${nc}${st}
      </td>
      <td style="padding:3px 6px;border-bottom:1px solid #eee;font-size:11px;color:#555">${LBL[n.type]}</td>
      <td style="padding:3px 6px;border-bottom:1px solid #eee;font-size:11px;color:#555">${n.nenCode||''}</td>
      <td style="padding:3px 6px;border-bottom:1px solid #eee;font-size:11px;color:#1a5fa8;font-family:monospace">${n.wcode||''}</td>
    </tr>${nt?`<tr><td colspan="4" style="padding:0">${nt}</td></tr>`:''}`;
    if(n.children&&!coll[n.id])n.children.forEach(c=>walk(c,depth+1));
  }
  tree.forEach(n=>walk(n,0));
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${projectName} — NEN 2767 Decompositie</title>
  <style>body{font-family:-apple-system,'Segoe UI',sans-serif;margin:20px;color:#222}h1{font-size:16px;color:#1a5fa8;border-bottom:2px solid #1a5fa8;padding-bottom:8px;margin-bottom:16px}table{width:100%;border-collapse:collapse}th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;padding:4px 6px;border-bottom:2px solid #ddd}tr:hover td{background:#f8f8f8}@media print{body{margin:10px}.no-print{display:none}}</style>
  </head><body>
  <div class="no-print" style="margin-bottom:16px"><button onclick="window.print()" style="padding:7px 18px;background:#1a5fa8;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:13px">🖨 Afdrukken / Opslaan als PDF</button></div>
  <h1>📋 ${projectName} — NEN 2767 Decompositie Bibliotheek</h1>
  <p style="font-size:11px;color:#888;margin-bottom:16px">Gegenereerd op ${new Date().toLocaleDateString('nl-NL',{day:'2-digit',month:'long',year:'numeric'})}</p>
  <table><thead><tr><th>Naam</th><th>Type</th><th>NEN Code</th><th>Werkcode</th></tr></thead><tbody>${rows}</tbody></table>
  </body></html>`);
  w.document.close();
  toast('📄 PDF-venster geopend — gebruik Afdrukken voor PDF');
}

// ══════════════════════════════════════════════════════════
//  TREE ACTIONS
// ══════════════════════════════════════════════════════════
function moveNode(id,dir){const par=findP(id);const list=par?par.children:tree;const idx=list.findIndex(n=>n.id===id);if(idx===-1)return;const ni=idx+dir;if(ni<0||ni>=list.length)return;pushUndo();[list[idx],list[ni]]=[list[ni],list[idx]];renderTree();autoSave();}
function deleteNode(id){const n=findN(id);if(!n)return;if(n.children?.length){showModal('Verwijderen',`<p style="font-size:12px;line-height:1.6">Weet je zeker dat je <b>${esc(n.label)}</b> inclusief alle onderliggende niveaus wilt verwijderen?</p>`,[{l:'Annuleren',c:'btn',cb:closeModal},{l:'Verwijderen',c:'btn danger',cb:()=>{pushUndo();doDelete(id);closeModal();}}]);}else{pushUndo();doDelete(id);}}
function doDelete(id){const par=findP(id);if(par)par.children=par.children.filter(c=>c.id!==id);else tree=tree.filter(n=>n.id!==id);if(selId===id){selId=null;closeDetail();}renderTree();autoSave();toast('Verwijderd');}
function openRename(id){const n=findN(id);if(!n)return;showModal('Naam wijzigen — '+LBL[n.type],`<div class="form-row"><label>Naam</label><input id="renInp" value="${esc(n.label)}"></div>`,[{l:'Annuleren',c:'btn',cb:closeModal},{l:'Opslaan',c:'btn primary',cb:()=>{const v=document.getElementById('renInp').value.trim();if(v){pushUndo();n.label=v;renderTree();autoSave();if(selId===id)showDetail(id);}closeModal();}}]);setTimeout(()=>{const el=document.getElementById('renInp');el&&el.select();},50);}
function openAddChild(parentId){const par=findN(parentId);if(!par)return;const ct=(KIDS[par.type]||[])[0];if(!ct)return;showModal('Toevoegen — '+LBL[ct],`<div class="form-row"><label>Naam</label><input id="addInp" placeholder="${LBL[ct]} naam"></div>`,[{l:'Annuleren',c:'btn',cb:closeModal},{l:'Toevoegen',c:'btn primary',cb:()=>{const v=document.getElementById('addInp').value.trim();if(v){pushUndo();addKid(par,{id:mkId(),type:ct,label:v,nenCode:'',wcode:'',notitie:'',photos:[],children:[]});coll[parentId]=false;renderTree();autoSave();toast(v+' toegevoegd');}closeModal();}}]);setTimeout(()=>{const el=document.getElementById('addInp');el&&el.focus();},50);}
function addAreaal(){showModal('Nieuw Areaal',`<div class="form-row"><label>Naam</label><input id="areaalInp" placeholder="bijv. Waterschap AGV"></div>`,[{l:'Annuleren',c:'btn',cb:closeModal},{l:'Aanmaken',c:'btn primary',cb:()=>{const v=document.getElementById('areaalInp').value.trim();if(v){pushUndo();tree.push({id:mkId(),type:'areaal',label:v,nenCode:'',wcode:'',notitie:'',children:[]});renderTree();autoSave();toast(v+' aangemaakt');}closeModal();}}]);setTimeout(()=>{const el=document.getElementById('areaalInp');el&&el.focus();},50);}
function expandAll(){function w(ns){for(const n of ns){coll[n.id]=false;if(n.children)w(n.children);}}w(tree);renderTree();}
function collapseAll(){function w(ns){for(const n of ns){if(n.children?.length)coll[n.id]=true;if(n.children)w(n.children);}}w(tree);renderTree();}

// ══════════════════════════════════════════════════════════
//  FASE 2 NAVIGATIE
// ══════════════════════════════════════════════════════════
function goToFase2(){
  autoSave();
  if(!tree.length){
    showModal('Naar Fase 2',
      `<p style="font-size:12px;line-height:1.6">Je hebt nog geen decompositie in Fase 1.<br><br>
      Je kunt Fase 2 ook zonder Fase 1 gebruiken — je kiest daar handmatig een beheerobject uit de NEN 2767 bibliotheek.</p>`,
      [{l:'Annuleren',c:'btn',cb:closeModal},
       {l:'Toch naar Fase 2 →',c:'btn primary',cb:()=>{closeModal();window.open('inspectie.html','_blank');}}]);
    return;
  }
  showModal('Naar Fase 2 — Conditiemeting',
    `<p style="font-size:12px;line-height:1.6">
      Je gaat naar <b>Fase 2 — Conditiemeting</b>.<br><br>
      Sla je decompositie op als JSON en laad deze daarna in Fase 2. 
      Alle beheerobjecten worden dan automatisch ingeladen in het inspectieformulier.
    </p>`,
    [{l:'Annuleren',c:'btn',cb:closeModal},
     {l:'💾 Opslaan + Fase 2 openen',c:'btn primary',cb:()=>{
       closeModal();
       const blob=new Blob([JSON.stringify({version:3,projectName,tree,idC},null,2)],{type:'application/json'});
       const a=document.createElement('a');a.href=URL.createObjectURL(blob);
       a.download=(projectName||'decompositie').replace(/[^a-z0-9]/gi,'_')+'.json';a.click();
       setTimeout(()=>window.open('inspectie.html','_blank'),600);
       toast('💾 JSON opgeslagen — Fase 2 opent zo…');
     }},
     {l:'Fase 2 openen (zonder opslaan)',c:'btn',cb:()=>{closeModal();window.open('inspectie.html','_blank');}}]);
}

// ══════════════════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════════════════
function showModal(title,body,btns){document.getElementById('mTitle').textContent=title;document.getElementById('mBody').innerHTML=body;document.getElementById('mBtns').innerHTML=btns.map(b=>`<button class="${b.c}">${esc(b.l)}</button>`).join('');document.getElementById('mBtns').querySelectorAll('button').forEach((btn,i)=>btn.addEventListener('click',btns[i].cb));document.getElementById('modalOverlay').style.display='flex';}
function closeModal(){document.getElementById('modalOverlay').style.display='none';}

// ══════════════════════════════════════════════════════════
//  SAVE / LOAD / EXPORT
// ══════════════════════════════════════════════════════════
let _st;
function autoSave(){
  try{localStorage.setItem('nen2767_v2',JSON.stringify({tree,idC,projectName}));}catch(e){}
  clearTimeout(_st);_st=setTimeout(()=>{const el=document.getElementById('topSaved');if(el){el.textContent='✓ Opgeslagen';setTimeout(()=>{el.textContent='';},2500);}},400);
}
function saveJSON(){const blob=new Blob([JSON.stringify({version:3,projectName,tree,idC},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(projectName||'decompositie').replace(/[^a-z0-9]/gi,'_')+'.json';a.click();toast('💾 Opgeslagen als JSON');}
function loadJSON(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const data=JSON.parse(e.target.result);tree=data.tree||[];idC=data.idC||1;projectName=data.projectName||'Project';document.getElementById('projectTitle').textContent=projectName;coll={};selId=null;undoStack=[];redoStack=[];document.getElementById('undoBtn').disabled=true;closeDetail();renderTree();autoSave();toast('📂 '+file.name+' geladen');}catch{toast('⚠ Ongeldig bestand');}};reader.readAsText(file);input.value='';}
function newProject(){showModal('Nieuw project',`<div class="form-row"><label>Projectnaam</label><input id="projInp" value="${esc(projectName)}"></div>`,[{l:'Annuleren',c:'btn',cb:closeModal},{l:'Aanmaken',c:'btn primary',cb:()=>{const v=document.getElementById('projInp').value.trim()||'Nieuw project';projectName=v;tree=[];idC=1;coll={};selId=null;undoStack=[];redoStack=[];document.getElementById('undoBtn').disabled=true;closeDetail();document.getElementById('projectTitle').textContent=v;renderTree();autoSave();closeModal();toast('Nieuw project: '+v);}}]);setTimeout(()=>{const el=document.getElementById('projInp');el&&el.select();},50);}
function renameProject(){showModal('Project hernoemen',`<div class="form-row"><label>Naam</label><input id="rpInp" value="${esc(projectName)}"></div>`,[{l:'Annuleren',c:'btn',cb:closeModal},{l:'Opslaan',c:'btn primary',cb:()=>{const v=document.getElementById('rpInp').value.trim();if(v){projectName=v;document.getElementById('projectTitle').textContent=v;autoSave();}closeModal();}}]);setTimeout(()=>{const el=document.getElementById('rpInp');el&&el.select();},50);}
function clearAll(){if(!tree.length)return;showModal('Alles leegmaken',`<p style="font-size:12px;line-height:1.6">Weet je zeker dat je de volledige decompositie wilt wissen?<br>Dit kan <b>niet</b> ongedaan worden gemaakt.</p>`,[{l:'Annuleren',c:'btn',cb:closeModal},{l:'Leegmaken',c:'btn danger',cb:()=>{pushUndo();tree=[];idC=1;coll={};selId=null;closeDetail();if(mapVisible)toggleMapView();renderTree();autoSave();closeModal();toast('Decompositie geleegd');}}]);}
function exportCSV(){
  const cols=['Niveau','Type','Naam','NEN Code','Maximo Werkcode','Status','Bouwjaar','Levensduur','Adres','Stad','Lat','Lon','Meenemen','Vakdiscipline','Functie','Definitie','Gebrekgroep','Gebreksoort','Belang','Eenheid','Intensiteit','Notitie','Foto count'];
  const rows=[cols];
  function walk(n,d){rows.push([d,LBL[n.type],n.label,n.nenCode||'',n.wcode||'',n.status||'',n.bouwjaar||'',n.levensduur||'',n.adres||'',n.stad||'',n.lat||'',n.lon||'',n.meenemen||'',n.vakdiscipline||'',n.functie||'',n.def||'',n.gebrekgroep||'',n.gebreksoort||'',n.belang||'',n.eenheid||'',n.intensiteit||'',n.notitie||'',n.photos?.length||0]);if(n.children)n.children.forEach(c=>walk(c,d+1));}
  tree.forEach(n=>walk(n,0));
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(projectName||'decompositie').replace(/[^a-z0-9]/gi,'_')+'.csv';a.click();toast('⬇ CSV: '+rows.length+' rijen');
}

// ══════════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════════
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3000);}

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
(function init(){
  try{const s=localStorage.getItem('nen2767_v2');if(s){const d=JSON.parse(s);tree=d.tree||[];idC=d.idC||1;projectName=d.projectName||'Nieuw project';document.getElementById('projectTitle').textContent=projectName;}}catch(e){}
  document.getElementById('canvas').addEventListener('dragover',e=>e.preventDefault());
  renderLib();renderTree();
})();
</script>
