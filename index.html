<style>

@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--sur:#242422;--sur2:#2e2e2a;--bdr:rgba(255,255,255,.10);--bdr2:rgba(255,255,255,.20);--tx:#f0efe9;--tx2:#a0a09a;--tx3:#606058;--blue-l:#0c447c22;--red-l:#50131322}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:300px;min-width:220px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.detail{width:290px;background:var(--sur);border-left:1px solid var(--bdr);overflow-y:auto;flex-shrink:0;display:none}
.detail.open{display:block}
.hdr{padding:10px 12px;border-bottom:1px solid var(--bdr);background:var(--sur);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hdr-title{font-size:12px;font-weight:600;flex:1;min-width:100px}
.btn{padding:5px 9px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:11px;cursor:pointer;background:var(--sur);color:var(--tx);display:inline-flex;align-items:center;gap:4px;white-space:nowrap;font-family:inherit;transition:background .12s}
.btn:hover{background:var(--sur2)}.btn.pr{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.pr:hover{background:#134e88}
.btn.dan{color:var(--red);border-color:var(--red);background:var(--red-l)}
/* Sidebar */
.sb-hdr{padding:10px 12px;border-bottom:1px solid var(--bdr)}
.sb-search{width:100%;padding:6px 10px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:12px;background:var(--sur2);color:var(--tx);outline:none;font-family:inherit;margin-top:7px}
.sb-search:focus{border-color:var(--blue)}
.sb-tabs{display:flex;border-bottom:1px solid var(--bdr)}
.stab{flex:1;padding:7px 2px;font-size:10px;font-weight:600;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--tx2);border-bottom:2px solid transparent;transition:all .15s;font-family:inherit}
.stab.active{color:var(--blue);border-bottom-color:var(--blue)}.stab:hover:not(.active){background:var(--sur2)}
.sb-mode{display:flex;gap:4px;padding:6px 8px;border-bottom:1px solid var(--bdr);background:var(--sur2)}
.mode-btn{flex:1;padding:4px 6px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:10px;font-weight:600;cursor:pointer;background:var(--sur);color:var(--tx2);text-align:center;transition:all .12s;font-family:inherit}
.mode-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.sb-count{font-size:10px;color:var(--tx3);padding:4px 12px;border-bottom:1px solid var(--bdr)}
.lib-list{flex:1;overflow-y:auto;padding:5px}
.lib-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--r);cursor:grab;font-size:11px;color:var(--tx);border:1px solid transparent;transition:all .1s;margin-bottom:2px;background:var(--sur2);user-select:none;-webkit-user-select:none}
.lib-item:hover{border-color:var(--bdr2);background:var(--sur)}.lib-item.dragging{opacity:.4}
.lib-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.lib-code{font-size:10px;color:var(--tx3);margin-left:auto;font-family:monospace;background:var(--bg);padding:1px 5px;border-radius:20px;white-space:nowrap;border:1px solid var(--bdr);flex-shrink:0}
.lib-smart-badge{font-size:9px;background:var(--blue);color:#fff;padding:1px 5px;border-radius:20px;flex-shrink:0;white-space:nowrap}
/* Tree */
.canvas{flex:1;overflow:auto;padding:14px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:8px;color:var(--tx2)}
.node-block{user-select:none;-webkit-user-select:none}
.node-row{display:flex;align-items:stretch}
.node-indent{display:flex}
.ip{width:20px;border-right:1px solid var(--bdr);margin-right:4px;flex-shrink:0}
.node-body{flex:1;display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:var(--r);border:1px solid transparent;background:var(--sur2);cursor:pointer;min-width:0;transition:border-color .1s,background .1s;margin-bottom:2px}
.node-body:hover{border-color:var(--bdr2)}.node-body.sel{border-color:var(--blue);background:var(--blue-l)}
.node-body.dov{border-color:var(--blue)!important;background:var(--blue-l)!important;outline:2px dashed var(--blue);outline-offset:-2px}
.node-body.dinv{border-color:var(--red)!important;background:var(--red-l)!important}
.ntog{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx2);cursor:pointer;flex-shrink:0;border-radius:4px;border:1px solid var(--bdr);background:var(--sur);font-family:monospace}
.ntog:hover{background:var(--sur2)}.nico{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nlab{font-size:11px;color:var(--tx);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ncod{font-size:10px;color:var(--tx3);font-family:monospace;flex-shrink:0}
.ncnt{font-size:10px;background:var(--sur);border:1px solid var(--bdr);color:var(--tx3);padding:0 4px;border-radius:20px;flex-shrink:0}
.nact{display:flex;gap:2px;opacity:0}.node-body:hover .nact{opacity:1}
.na{width:20px;height:20px;border:none;background:transparent;cursor:pointer;color:var(--tx2);font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:4px;padding:0}
.na:hover{background:var(--sur);color:var(--tx)}
/* Phase badge */
.phase-tag{font-size:9px;padding:1px 5px;border-radius:20px;border:1px solid var(--bdr);color:var(--tx3);background:var(--sur);flex-shrink:0}
/* Detail */
.dp-hdr{padding:11px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.dp-ttl{font-size:12px;font-weight:600}.dp-body{padding:13px}
.dpf{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}.dpf:last-child{border:none}
.dpl{font-size:10px;color:var(--tx3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.dpv{font-size:12px;color:var(--tx);line-height:1.5}
.tbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.dp-acts{display:flex;flex-direction:column;gap:6px;margin-top:12px}
/* Modal */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000}
.mbox{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);padding:20px;width:420px;max-width:95vw;box-shadow:var(--sh)}
.mbox h3{font-size:14px;font-weight:600;margin-bottom:13px}
.fr{margin-bottom:9px}.fr label{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px}
.fr input,.fr select,.fr textarea{width:100%;padding:7px 10px;border:1px solid var(--bdr2);border-radius:var(--r);font-size:12px;background:var(--sur2);color:var(--tx);outline:none;font-family:inherit}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--blue)}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:13px}
/* Toast */
.toast{position:fixed;bottom:18px;right:18px;background:var(--tx);color:var(--bg);padding:9px 15px;border-radius:var(--r);font-size:12px;z-index:9999;box-shadow:var(--sh);opacity:0;transition:opacity .2s;pointer-events:none;max-width:320px}
.toast.show{opacity:1}
/* Loading */
.loading{position:fixed;inset:0;background:rgba(245,244,240,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:12px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--bdr2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
</style>
</head>

<div class="loading" id="loading">

    <div class="lib-list" id="libList"></div>
  </div>

  <div class="main">

      <button class="btn" onclick="importJSON()">⬆ Importeer</button>
    </div>
    <div class="canvas" id="canvas">
      <div id="treeRoot"></div>
    </div>
  </div>

  <div class="detail" id="detailPanel">
    <div class="dp-hdr">
      <span class="dp-ttl" id="dpTitle">Details</span>
      <button class="btn" onclick="closeDetail()" style="padding:2px 7px;font-size:11px">✕</button>
    </div>
    <div class="dp-body" id="dpBody"></div>
  </div>
</div>

<div class="moverlay" id="moverlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="mbox" id="mbox"></div>
</div>
<div class="toast" id="toast"></div>

let tree=[], idC=1, activeTab='bo', libMode='smart', selId=null, coll={}, dragLib=null, dragNid=null;
const KIDS={portfolio:['complex'],complex:['bo'],bo:['eg'],eg:['el'],el:['sy'],sy:['bd'],bd:['gb'],gb:[]};
const TLBL={portfolio:'Areaal Portefeuille',complex:'Complex',bo:'Beheerobject',eg:'Elementengroep',el:'Element',sy:'Systeem',bd:'Bouwdeel',gb:'Gebrek'};
const TCOL={portfolio:'#534AB7',complex:'#185FA5',bo:'#378ADD',eg:'#0D7A6E',el:'#1D9E75',sy:'#5B8C5A',bd:'#BA7517',gb:'#E24B4A'};

function mkId(){return 'n'+(idC++)}
function findN(id,ns=tree){for(const n of ns){if(n.id===id)return n;if(n.children){const r=findN(id,n.children);if(r)return r;}}return null}
function findP(id,ns=tree,p=null){for(const n of ns){if(n.id===id)return p;if(n.children){const r=findP(id,n.children,n);if(r)return r;}}return null}
function libItem(t,n){return LIB[t]?.find(i=>i.n===n)||{}}
function countD(n){let c=(n.children||[]).length;(n.children||[]).forEach(x=>c+=countD(x));return c}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ══════════════════════════════════════════════════
//  SMART MAPPING — build full tree from BO
// ══════════════════════════════════════════════════
function buildBoTree(boName) {
  const boData = M[S.indexOf(boName)];
  if (!boData) return null;
  const boNode = {id:mkId(), type:'bo', label:boName, code:LIB.bo.find(x=>x.n===boName)?.c||'', children:[]};
  for (const egEntry of boData) {
    const egName = S[egEntry[0]];
    const egNode = {id:mkId(), type:'eg', label:egName, code:'', children:[]};
    for (const elEntry of egEntry[1]) {
      const elName = S[elEntry[0]];
      const elM = S[elEntry[1]];
      const elNode = {id:mkId(), type:'el', label:elName, code:LIB.el.find(x=>x.n===elName)?.c||'', meenemen:elM, children:[]};
      for (const syEntry of elEntry[2]) {
        const syName = S[syEntry[0]];
        const syNode = {id:mkId(), type:'sy', label:syName, code:'', children:[]};
        for (const bdEntry of syEntry[1]) {
          const bdName = S[bdEntry[0]];
          const bdM = S[bdEntry[1]];
          const bdNode = {id:mkId(), type:'bd', label:bdName, code:LIB.bd.find(x=>x.n===bdName)?.c||'', meenemen:bdM, children:[]};
          for (const gbEntry of bdEntry[2]) {
            const gbName = S[gbEntry[0]];
            const ggName = S[gbEntry[1]];
            const gbM = S[gbEntry[2]];
            bdNode.children.push({id:mkId(), type:'gb', label:gbName, code:LIB.gb.find(x=>x.n===gbName)?.c||'', gebrekgroep:ggName, meenemen:gbM, children:[]});
          }
          syNode.children.push(bdNode);
        }
        elNode.children.push(syNode);
      }
      egNode.children.push(elNode);
    }
    boNode.children.push(egNode);
  }
  return boNode;
}

function switchTab(t){activeTab=t;['bo','el','bd','gb'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===t));renderLib()}
function switchMode(m){
  libMode=m;
  document.getElementById('mode-smart').classList.toggle('active',m==='smart');
  document.getElementById('mode-manual').classList.toggle('active',m==='manual');
  renderLib();
}

function renderLib(){
  const q=(document.getElementById('libSearch').value||'').toLowerCase();
  const items=LIB[activeTab].filter(i=>!q||i.n.toLowerCase().includes(q)||(i.c&&i.c.toString().toLowerCase().includes(q)));
  const cl={bo:'#378ADD',el:'#1D9E75',bd:'#BA7517',gb:'#E24B4A'}[activeTab];
  const isSmart = libMode==='smart' && activeTab==='bo';
  document.getElementById('libCount').textContent=
    (isSmart ? '🔗 Slim — versleep een object voor volledige hiërarchie' :
    `${items.length} van ${LIB[activeTab].length} items`);
  const list=document.getElementById('libList');
  list.innerHTML=items.length?items.map(i=>`
    <div class="lib-item" draggable="true" data-type="${activeTab}" data-name="${esc(i.n)}" title="${esc(i.n)}${isSmart?' → volledige decompositie wordt automatisch gebouwd':''}">
      <span class="lib-dot" style="background:${cl}"></span>
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">${esc(i.n)}</span>
      ${isSmart?`<span class="lib-smart-badge">auto</span>`:''}
      <span class="lib-code">${esc(i.c)}</span>
    </div>`).join(''):'<div style="text-align:center;padding:20px;font-size:11px;color:var(--tx3)">Geen resultaten</div>';
  list.querySelectorAll('.lib-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      dragLib={type:e.currentTarget.dataset.type,name:e.currentTarget.dataset.name,smart:isSmart};
      e.dataTransfer.effectAllowed='copy';
      setTimeout(()=>e.target.classList.add('dragging'),0);
    });
    el.addEventListener('dragend',e=>{e.target.classList.remove('dragging');dragLib=null});
    el.addEventListener('dblclick',e=>{quickInsert(activeTab,e.currentTarget.dataset.name,isSmart)});
  });
}

function quickInsert(type,name,smart=false){
  if(!tree.length){toast('Maak eerst een Areaal Portefeuille aan');return}
  if(smart && type==='bo'){
    // Find first complex
    const cplx=findFirstOfType('complex');
    if(!cplx){toast('Voeg eerst een Complex toe aan het Areaal');return}
    const boNode=buildBoTree(name);
    if(boNode){addKid(cplx,boNode);coll[cplx.id]=false;renderTree();toast(name+' + volledige hiërarchie toegevoegd');}
    return;
  }
  const PKIDS={eg:'bo',el:'eg',sy:'el',bd:'sy',gb:'bd',complex:'portfolio',bo:'complex'};
  const ptype=PKIDS[type];
  const par=findFirstOfType(ptype);
  if(!par){toast('Geen '+TLBL[ptype]+' gevonden');return}
  addKid(par,{id:mkId(),type,label:name,code:libItem(type,name)?.c||'',children:[]});
  coll[par.id]=false;renderTree();toast(name+' toegevoegd');
}
function findFirstOfType(type,ns=tree){for(const n of ns){if(n.type===type)return n;if(n.children){const r=findFirstOfType(type,n.children);if(r)return r;}}return null}
function addKid(par,child){if(!par.children)par.children=[];par.children.push(child)}

// ══════════════════════════════════════════════════
//  TREE RENDER
// ══════════════════════════════════════════════════
function renderTree(){
  const root=document.getElementById('treeRoot');
  if(!tree.length){root.innerHTML=`<div class="empty"><div style="font-size:40px;opacity:.3">🏗</div><p style="font-size:13px;font-weight:500">Nog geen decompositie</p><small style="font-size:12px;text-align:center;color:var(--tx3)">Klik "+ Nieuw Areaal", voeg een Complex toe<br>en sleep een Beheerobject (slim modus = volledige hiërarchie)</small></div>`;return}
  root.innerHTML=tree.map(n=>renderNodeHTML(n,0)).join('');
  attachEvents();
}

function renderNodeHTML(node,depth){
  const hk=node.children&&node.children.length>0;
  const ic=coll[node.id];
  const col=TCOL[node.type]||'#888';
  const pipes=Array.from({length:depth},()=>'<div class="ip"></div>').join('');
  const mTag=node.meenemen&&node.meenemen!=='ja'?`<span class="phase-tag">${node.meenemen}</span>`:'';
  return `<div class="node-block" id="blk-${node.id}" data-id="${node.id}" data-type="${node.type}">
    <div class="node-row"><div class="node-indent">${pipes}</div>
    <div class="node-body ${selId===node.id?'sel':''}" id="nb-${node.id}" data-id="${node.id}" data-type="${node.type}">
      ${hk?`<span class="ntog" data-tog="${node.id}">${ic?'+':'−'}</span>`:`<span style="width:16px;flex-shrink:0"></span>`}
      <span class="nico" style="background:${col}"></span>
      <span class="nlab" title="${esc(node.label)}">${esc(node.label)}</span>
      ${node.code?`<span class="ncod">${esc(node.code)}</span>`:''}
      ${mTag}
      ${hk?`<span class="ncnt">${node.children.length}</span>`:''}
      <span class="nact">
        ${KIDS[node.type]?.length>0?`<button class="na" data-act="add" data-id="${node.id}" title="Kind toevoegen">＋</button>`:''}
        <button class="na" data-act="up" data-id="${node.id}" title="Omhoog">↑</button>
        <button class="na" data-act="dn" data-id="${node.id}" title="Omlaag">↓</button>
        <button class="na" data-act="ren" data-id="${node.id}" title="Naam wijzigen">✎</button>
        <button class="na" data-act="del" data-id="${node.id}" title="Verwijderen">✕</button>
      </span>
    </div></div>
    ${hk&&!ic?`<div class="node-children">${node.children.map(c=>renderNodeHTML(c,depth+1)).join('')}</div>`:''}</div>`;
}

function attachEvents(){
  document.querySelectorAll('[data-tog]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const id=el.dataset.tog;coll[id]=!coll[id];renderTree()}));
  document.querySelectorAll('.node-body').forEach(el=>{
    el.addEventListener('click',e=>{if(e.target.closest('[data-act]')||e.target.closest('[data-tog]'))return;showDetail(el.dataset.id)});
  });
  document.querySelectorAll('[data-act]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();const id=el.dataset.id,act=el.dataset.act;
    if(act==='add')openAddChildModal(id);
    if(act==='ren')openRenameModal(id);
    if(act==='del')deleteNode(id);
    if(act==='up')moveNode(id,-1);
    if(act==='dn')moveNode(id,1);
  }));
  document.querySelectorAll('.node-body').forEach(el=>{
    el.setAttribute('draggable','true');
    el.addEventListener('dragstart',e=>{dragNid=el.dataset.id;dragLib=null;e.dataTransfer.effectAllowed='move';setTimeout(()=>el.classList.add('dragging'),0)});
    el.addEventListener('dragend',()=>{document.querySelectorAll('.node-body.dragging,.node-body.dov,.node-body.dinv').forEach(x=>x.classList.remove('dragging','dov','dinv'));dragNid=null});
    el.addEventListener('dragover',e=>{
      e.preventDefault();e.stopPropagation();
      document.querySelectorAll('.node-body.dov,.node-body.dinv').forEach(x=>x.classList.remove('dov','dinv'));
      const tt=el.dataset.type;
      if(dragLib){const ok=KIDS[tt]?.includes(dragLib.type)||((dragLib.smart||dragLib.type==='bo')&&tt==='complex');el.classList.add(ok?'dov':'dinv')}
      else if(dragNid&&dragNid!==el.dataset.id){const n=findN(dragNid);const ok=KIDS[tt]?.includes(n?.type);el.classList.add(ok?'dov':'dinv')}
    });
    el.addEventListener('dragleave',e=>{if(!el.contains(e.relatedTarget))el.classList.remove('dov','dinv')});
    el.addEventListener('drop',e=>{
      e.preventDefault();e.stopPropagation();
      el.classList.remove('dov','dinv');
      const tnode=findN(el.dataset.id);if(!tnode)return;
      if(dragLib){
        const {type,name,smart}=dragLib;
        if(smart && type==='bo' && tnode.type==='complex'){
          const boNode=buildBoTree(name);
          if(boNode){addKid(tnode,boNode);coll[tnode.id]=false;renderTree();toast(name+' + volledige decompositie toegevoegd ✓');}
        } else if(KIDS[tnode.type]?.includes(type)){
          addKid(tnode,{id:mkId(),type,label:name,code:libItem(type,name)?.c||'',children:[]});
          coll[tnode.id]=false;renderTree();toast(name+' toegevoegd');
        } else {
          toast('⚠ '+TLBL[type]+' past niet onder '+TLBL[tnode.type]);
        }
      } else if(dragNid&&dragNid!==tnode.id){
        const n=findN(dragNid);if(!n)return;
        if(!KIDS[tnode.type]?.includes(n.type)){toast('⚠ past niet hier');return}
        const op=findP(dragNid);
        if(op)op.children=op.children.filter(c=>c.id!==dragNid);else tree=tree.filter(x=>x.id!==dragNid);
        addKid(tnode,n);coll[tnode.id]=false;renderTree();toast(n.label+' verplaatst');
      }
    });
  });
}

// ══════════════════════════════════════════════════
//  TREE ACTIONS
// ══════════════════════════════════════════════════
function moveNode(id,dir){
  const par=findP(id);const list=par?par.children:tree;
  const idx=list.findIndex(n=>n.id===id);if(idx===-1)return;
  const ni=idx+dir;if(ni<0||ni>=list.length)return;
  [list[idx],list[ni]]=[list[ni],list[idx]];renderTree();
}
function expandAll(){function w(ns){ns.forEach(n=>{coll[n.id]=false;if(n.children)w(n.children)})}w(tree);renderTree()}
function collapseAll(){function w(ns){ns.forEach(n=>{if(n.children?.length)coll[n.id]=true;if(n.children)w(n.children)})}w(tree);renderTree()}
function deleteNode(id){
  if(!confirm('Verwijder dit item en alle onderliggende items?'))return;
  const p=findP(id);
  if(p)p.children=p.children.filter(c=>c.id!==id);else tree=tree.filter(n=>n.id!==id);
  if(selId===id)closeDetail();renderTree();
}

    ${node.code?`<div class="dpf"><div class="dpl">NEN 2767 Code</div><div class="dpv" style="font-family:monospace">${esc(node.code)}</div></div>`:''}
    ${row('Meenemen',node.meenemen)}
    ${row('Gebrekgroep',node.gebrekgroep)}

    <div class="dpf"><div class="dpl">Fase</div><div class="dpv" style="color:var(--tx3)">Fase 1 — Decompositie bibliotheek</div></div>
    <div class="dp-acts">
      ${kids.length>0?`<button class="btn" onclick="openAddChildModal('${id}')">＋ Kind toevoegen</button>`:''}
      <button class="btn" onclick="openRenameModal('${id}')">✎ Naam wijzigen</button>
      <button class="btn" onclick="moveNode('${id}',-1)">↑ Omhoog</button>
      <button class="btn" onclick="moveNode('${id}',1)">↓ Omlaag</button>
      <button class="btn dan" onclick="deleteNode('${id}')">✕ Verwijderen</button>
    </div>`;
  renderTree();
}
function closeDetail(){selId=null;document.getElementById('detailPanel').classList.remove('open');renderTree()}

function openAddChildModal(pid){

  const ct=KIDS[p.type];if(!ct||!ct.length){toast('Geen kinderen mogelijk');return}

}
function openRenameModal(id){
  const n=findN(id);if(!n)return;
  document.getElementById('mbox').innerHTML=`
    <h3>Naam wijzigen</h3>
    <div class="fr"><label>Naam</label><input id="rN" type="text" value="${esc(n.label)}"></div>
    <div class="fr"><label>Code</label><input id="rC" type="text" value="${esc(n.code||'')}"></div>
    <div class="mbtns"><button class="btn" onclick="closeModal()">Annuleren</button><button class="btn pr" onclick="doRename('${id}')">Opslaan</button></div>`;
  document.getElementById('moverlay').style.display='flex';
  setTimeout(()=>document.getElementById('rN')?.focus(),50);
}
function doAdd(type,pid){
  const name=document.getElementById('mN')?.value?.trim();if(!name){toast('Vul een naam in');return}
  const code=document.getElementById('mC')?.value?.trim()||'';
  const node={id:mkId(),type,label:name,code,children:[]};
  if(pid){const p=findN(pid);if(p){addKid(p,node);coll[pid]=false}}else tree.push(node);
  closeModal();renderTree();toast(name+' toegevoegd');
}
function doRename(id){
  const n=findN(id);if(!n)return;
  const name=document.getElementById('rN')?.value?.trim();if(name)n.label=name;
  n.code=document.getElementById('rC')?.value?.trim()||n.code;
  closeModal();if(selId===id)showDetail(id);else renderTree();
}
function closeModal(){document.getElementById('moverlay').style.display='none'}

// ══════════════════════════════════════════════════
//  EXPORT / IMPORT
// ══════════════════════════════════════════════════
function exportJSON(){
  const d=JSON.stringify({version:'2.0',fase:'1-Decompositie',created:new Date().toISOString(),tree},null,2);
  dl('NEN2767_decompositie.json',d,'application/json');toast('JSON geëxporteerd');
}
function exportExcel(){
  const rows=[['Niveau','Type','Naam','Code','Meenemen','Pad']];
  function w(n,path,lvl){
    const p=path?path+' > '+n.label:n.label;
    rows.push([lvl,TLBL[n.type]||n.type,n.label,n.code||'',n.meenemen||'',path||'(root)']);
    (n.children||[]).forEach(c=>w(c,p,lvl+1));
  }
  tree.forEach(n=>w(n,'',0));
  const csv=rows.map(r=>r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\r\n');
  dl('NEN2767_decompositie.csv','\uFEFF'+csv,'text/csv;charset=utf-8');toast('Excel/CSV geëxporteerd');
}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.tree){tree=d.tree;renderTree();toast('Import geslaagd!')}else toast('Ongeldig formaat')}catch(err){toast('Fout: '+err.message)}};r.readAsText(f)};
  inp.click();
}
function dl(name,content,type){const b=new Blob([content],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
function toast(msg,ms=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms)}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
document.getElementById('libSearch').addEventListener('input',renderLib);
document.getElementById('canvas').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('canvas').addEventListener('drop',e=>{
  e.preventDefault();
  if(dragLib&&dragLib.type==='portfolio')openAddModal('portfolio',null);
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeDetail()}});

// Show app after mapping.js is loaded
window.addEventListener('load',()=>{
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  renderLib();renderTree();
});
</script>
