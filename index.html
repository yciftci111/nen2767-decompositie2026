<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRA Bibliotheek</title>
<style>
:root{
  --bg:#F0F2F5;--sur:#fff;--s2:#F7F8FA;--bdr:#DDE1E7;
  --acc:#1A4F8A;--asf:#E8EFF7;--amd:#2E6DA4;
  --th:#0D1B2A;--tb:#3A4A5C;--tm:#8A96A3;
  --ja:#1A7A4A;--jab:#E8F5EE;
  --op:#A05A00;--opb:#FFF3E0;
  --ne:#B0302A;--neb:#FDECEB;
  --c1:#6B3FA0;--c1b:#F0EAF9;
  --c3:#1A7A4A;--c3b:#E8F5EE;
  --c4:#1A4F8A;--c4b:#E8EFF7;
  --panel:360px;--r:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tb);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{height:54px;background:var(--acc);color:#fff;display:flex;align-items:center;gap:12px;padding:0 18px;box-shadow:0 2px 8px rgba(0,0,0,.2);flex-shrink:0}
.hbadge{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,255,255,.18);padding:3px 8px;border-radius:4px}
.htitle{font-size:15px;font-weight:600}.hsub{font-size:11px;opacity:.6;margin-top:1px}
.hstats{display:flex;gap:16px;margin-left:auto}
.hstat{text-align:right;font-size:10px;opacity:.65}
.hstat strong{display:block;font-size:16px;font-weight:700;opacity:1;line-height:1.1}
.wrap{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
aside{width:272px;min-width:272px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:10px 12px 6px;border-bottom:1px solid var(--bdr)}
.sb-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.sb-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);flex:1}
.sb-cnt{font-size:11px;color:var(--tm)}
.sb-search{width:100%;padding:6px 8px 6px 27px;border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;color:var(--th);
  background:var(--s2) url("data:image/svg+xml,%3Csvg width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='%238A96A3' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E") no-repeat 8px center;
  outline:none;transition:border-color .15s}
.sb-search:focus{border-color:var(--acc)}
.sb-tabs{display:flex;gap:4px;padding:6px 10px;border-bottom:1px solid var(--bdr)}
.stab{flex:1;padding:3px 0;border:1px solid var(--bdr);border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;text-align:center;background:var(--s2);color:var(--tm);transition:.15s}
.stab.on{border-color:var(--acc);background:var(--asf);color:var(--acc)}
.stab.on-ja{border-color:var(--ja);background:var(--jab);color:var(--ja)}
.stab.on-op{border-color:var(--op);background:var(--opb);color:var(--op)}
.stab.on-ne{border-color:var(--ne);background:var(--neb);color:var(--ne)}
.bo-list{flex:1;overflow-y:auto;padding:4px 0}
.bo-item{display:flex;align-items:center;gap:7px;padding:6px 10px;cursor:grab;font-size:12px;color:var(--tb);border-bottom:1px solid var(--bg);transition:background .1s;user-select:none}
.bo-item:hover{background:var(--asf)}
.bo-item.dragging{opacity:.3}
.bcode{font-size:10px;font-weight:700;color:#fff;background:var(--acc);padding:2px 5px;border-radius:3px;flex-shrink:0;min-width:26px;text-align:center}
.bname{flex:1;line-height:1.3}
.bcnt{font-size:10px;color:var(--tm);flex-shrink:0}

/* MAIN */
main{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;min-width:0}
.add-bar{display:flex;gap:6px;flex-shrink:0}
.add-inp{flex:1;padding:7px 12px;border:1px solid var(--bdr);border-radius:var(--r);font-size:13px;color:var(--th);outline:none;transition:border-color .15s}
.add-inp:focus{border-color:var(--acc)}
.add-btn{padding:7px 14px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer}
.add-btn:hover{background:var(--amd)}
.toolbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex-shrink:0}
.tbtn{padding:5px 9px;border:1px solid var(--bdr);background:var(--sur);border-radius:var(--r);font-size:11px;color:var(--tb);cursor:pointer;transition:.15s;white-space:nowrap}
.tbtn:hover{border-color:var(--amd);background:var(--asf);color:var(--acc)}
.tsep{width:1px;height:20px;background:var(--bdr)}
.tinfo{font-size:11px;color:var(--tm);margin-left:auto}
.tree-area{display:flex;flex-direction:column;gap:5px}

/* NODES */
.nd{border-radius:var(--r);border:1.5px solid var(--bdr);background:var(--sur);margin-bottom:2px}
.nd-areaal{border-color:var(--c1)}.nd-areaal>.nd-hd{background:var(--c1b)}
.nd-complex{border-color:var(--c3)}.nd-complex>.nd-hd{background:var(--c3b)}
.nd-bo>.nd-hd{background:var(--sur)}
.nd-bo.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--asf)}.nd-bo.sel>.nd-hd{background:var(--asf)}
.nd-hd{display:flex;align-items:center;gap:7px;padding:8px 12px;cursor:pointer;user-select:none;border-radius:4px 4px 0 0;transition:filter .12s}
.nd-hd:hover{filter:brightness(.96)}
.nd-hd.dov{outline:2px dashed var(--acc);outline-offset:-2px}
.nd-bar{width:4px;min-height:24px;border-radius:2px;flex-shrink:0;align-self:stretch}
.nd-meta{flex:1;min-width:0}
.nd-tag{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.65}
.nd-lbl{font-size:13px;font-weight:600;color:var(--th);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nd-sub{font-size:10px;color:var(--tm);font-style:italic}
.nd-badges{display:flex;gap:3px;align-items:center;flex-shrink:0}
.badge{font-size:10px;font-weight:700;padding:2px 5px;border-radius:10px}
.bja{background:var(--jab);color:var(--ja)}.bop{background:var(--opb);color:var(--op)}.bne{background:var(--neb);color:var(--ne)}
.pbar{height:3px;background:var(--bdr);border-radius:2px;width:40px;overflow:hidden}
.pbar-f{height:100%;background:var(--ja);border-radius:2px}
.nd-acts{display:flex;gap:2px;flex-shrink:0}
.nact{padding:3px 7px;border:none;background:rgba(0,0,0,.05);cursor:pointer;border-radius:3px;color:var(--tb);font-size:11px;font-weight:600;transition:.15s;white-space:nowrap;line-height:1.4}
.nact:hover{background:var(--asf);color:var(--acc)}
.nact.del:hover{background:var(--neb);color:var(--ne)}
.nd-chev{color:var(--tm);transition:transform .2s;flex-shrink:0;font-size:11px}
.nd.open>.nd-hd .nd-chev{transform:rotate(90deg)}

/* INLINE FORMS */
.nd-form{display:flex;gap:5px;padding:7px 12px;border-top:1px solid var(--acc);background:var(--asf)}
.nd-form input{flex:1;padding:6px 10px;border:1px solid var(--acc);border-radius:4px;font-size:13px;color:var(--th);outline:none}
.fok{padding:6px 12px;background:var(--acc);color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer}
.fok:hover{background:var(--amd)}
.fcan{padding:6px 8px;background:none;border:1px solid var(--bdr);border-radius:4px;font-size:12px;cursor:pointer;color:var(--tb)}
.cx-form{display:flex;gap:5px;padding:5px 0 3px}
.cx-form input{flex:1;padding:6px 10px;border:1px solid var(--c3);border-radius:4px;font-size:12px;color:var(--th);outline:none}
.cx-fok{padding:6px 12px;background:var(--c3);color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer}

/* CHILDREN */
.nd-kids{display:none;flex-direction:column;gap:3px;padding:5px 6px 7px 14px;border-top:1px solid var(--bdr);background:var(--s2)}
.nd.open>.nd-kids{display:flex}
.drop-strip{display:none;border:2px dashed var(--bdr);border-radius:4px;padding:5px;text-align:center;font-size:11px;color:var(--tm);transition:.15s;margin-top:2px}
.drop-strip.vis{display:block}
.drop-strip.ov{border-color:var(--acc);background:var(--asf);color:var(--acc)}

/* DETAIL PANEL */
.detail-panel{width:var(--panel);min-width:var(--panel);background:var(--sur);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;transition:width .2s,min-width .2s}
.detail-panel.closed{width:0;min-width:0;border:none;overflow:hidden}
.dp-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bdr);background:var(--acc);color:#fff;flex-shrink:0}
.dp-title{font-size:13px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 2px;opacity:.8;line-height:1}
.dp-body{flex:1;overflow-y:auto}
.dp-sec{padding:11px 14px;border-bottom:1px solid var(--bdr)}
.dp-sec-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tm);margin-bottom:8px}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:6px}
.dp-grid.full{grid-template-columns:1fr}
.dp-field label{font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:3px}
.dp-field input,.dp-field select,.dp-field textarea{width:100%;padding:6px 8px;border:1px solid var(--bdr);border-radius:4px;font-size:12px;color:var(--th);background:var(--sur);outline:none;transition:border-color .15s;font-family:inherit}
.dp-field input:focus,.dp-field select:focus,.dp-field textarea:focus{border-color:var(--acc)}
.dp-field input[readonly]{background:var(--s2);color:var(--tm)}
.dp-field textarea{resize:vertical;min-height:68px;line-height:1.5}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
.photo-thumb{aspect-ratio:1;border-radius:4px;overflow:hidden;background:var(--s2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:10px;color:var(--tm);flex-direction:column;gap:3px}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb.add-photo{border-style:dashed}
.photo-thumb.add-photo:hover{border-color:var(--acc);color:var(--acc);background:var(--asf)}
.photo-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:3px;font-size:11px;padding:1px 5px;cursor:pointer;display:none;line-height:1.4}
.photo-thumb:hover .photo-del{display:block}

/* ELEMENTS IN DETAIL */
.el-fbar2{display:flex;gap:5px;padding:8px 14px;border-bottom:1px solid var(--bdr);background:var(--s2);flex-wrap:wrap;align-items:center}
.eftab2{padding:2px 8px;border:1px solid var(--bdr);border-radius:10px;font-size:10px;font-weight:700;cursor:pointer;background:var(--sur);color:var(--tm);transition:.15s}
.eftab2.a{border-color:var(--acc);background:var(--asf);color:var(--acc)}
.eftab2.ja{border-color:var(--ja);background:var(--jab);color:var(--ja)}
.eftab2.op{border-color:var(--op);background:var(--opb);color:var(--op)}
.eftab2.ne{border-color:var(--ne);background:var(--neb);color:var(--ne)}
.el-list2{padding:6px 14px 10px;display:flex;flex-direction:column;gap:2px}
.el-row2{display:flex;align-items:flex-start;gap:7px;padding:5px 6px;border-radius:4px;font-size:11px}
.el-row2:hover{background:var(--asf)}
.el-row2.off{opacity:.45}
.el-check{width:14px;height:14px;flex-shrink:0;margin-top:2px;accent-color:var(--acc);cursor:pointer}
.echip2{font-size:9px;font-weight:700;padding:2px 5px;border-radius:10px;flex-shrink:0;white-space:nowrap;margin-top:1px}
.cja{background:var(--jab);color:var(--ja)}.cop{background:var(--opb);color:var(--op)}.cne{background:var(--neb);color:var(--ne)}
.el-name2{color:var(--th);flex:1;font-weight:500;line-height:1.3}
.el-rsn2{color:var(--tm);font-size:10px;line-height:1.4;margin-top:1px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;text-align:center;color:var(--tm)}
.empty h2{font-size:17px;font-weight:600;color:var(--th)}
.empty p{font-size:13px;max-width:340px;line-height:1.6}
.dp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:40px 16px;text-align:center;color:var(--tm)}
.dp-empty p{font-size:12px;line-height:1.5}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
#ghost{position:fixed;pointer-events:none;z-index:9999;background:var(--acc);color:#fff;padding:5px 12px;border-radius:4px;font-size:12px;font-weight:600;display:none}
</style>
</head>
<body>
<header>
  <div class="hbadge">NEN 2767</div>
  <div><div class="htitle">Prestatiegestuurde Risicoanalyses (PRA)</div><div class="hsub">Decompositiebibliotheek</div></div>
  <div class="hstats">

<div class="wrap">
  <aside>

  <main>
    <div class="add-bar">

      <button class="add-btn" id="top-btn">+ Toevoegen</button>
    </div>
    <div class="toolbar">
      <button class="tbtn" id="btn-expand">↕ Uitklappen</button>
      <button class="tbtn" id="btn-collapse">↕ Inklappen</button>
      <div class="tsep"></div>
      <button class="tbtn" id="btn-clear">🗑 Leegmaken</button>
      <div class="tsep"></div>
      <button class="tbtn" id="btn-save">💾 Opslaan</button>
      <button class="tbtn" id="btn-load">📂 Laden</button>
      <span class="tinfo" id="tinfo">Voeg een Areaal / Portefeuille toe</span>
    </div>
    <div class="tree-area" id="tree-area"></div>
  </main>
  <div class="detail-panel closed" id="detail-panel">
    <div class="dp-head">
      <span class="dp-title" id="dp-title">—</span>
      <button class="dp-close" id="dp-close">×</button>
    </div>
    <div class="dp-body" id="dp-body">
      <div class="dp-empty"><p>Klik op een beheerobject<br>om details te tonen</p></div>
    </div>
  </div>
</div>
<div id="ghost"></div>

function nid(){ return 'n'+(UID++); }

function makeBO(code){
  var bo = BOMAP[code];
  return {
    id:nid(), type:'bo', label:(bo?bo.naam:code), boCode:code,
    open:false, children:[],
    _addingCX:false, _renaming:false, _renameVal:'', _delConfirm:false,
    maximo:'', status:'actief', bouwjaar:'', levensduur:'',
    adres:'', stad:'', lat:'', lon:'', notitie:'',
    photos:[], disabledEls:[]
  };
}

function makeContainer(type, label){
  return {
    id:nid(), type:type, label:label, open:true, children:[],
    _addingCX:false, _renaming:false, _renameVal:'', _delConfirm:false
  };
}

// ═══════════════════════════════════════════
// TREE HELPERS
// ═══════════════════════════════════════════
function findNode(id, ns){
  ns = ns || tree;
  for(var i=0;i<ns.length;i++){
    if(ns[i].id===id) return ns[i];
    var f = findNode(id, ns[i].children);
    if(f) return f;
  }
  return null;
}
function extractNode(id, ns){
  ns = ns || tree;
  for(var i=0;i<ns.length;i++){
    if(ns[i].id===id){ return ns.splice(i,1)[0]; }
    var f = extractNode(id, ns[i].children);
    if(f) return f;
  }
  return null;
}
function isAncestor(ancId, descId){
  var a = findNode(ancId);
  return a ? !!findNode(descId, a.children) : false;
}
function firstType(ns, type){
  for(var i=0;i<ns.length;i++){
    if(ns[i].type===type) return ns[i];
    var f = firstType(ns[i].children, type);
    if(f) return f;
  }
  return null;
}

function topAdd(){
  var inp = document.getElementById('top-inp');
  var label = inp.value.trim();
  if(!label){ inp.focus(); return; }
  tree.push(makeContainer('areaal', label));
  inp.value = '';
  render();
}

function toggleNode(id){
  var n = findNode(id);
  if(n){ n.open = !n.open; render(); }
}

function askDel(id){
  var n = findNode(id); if(n){ n._delConfirm=true; render(); }
}
function cancelDel(id){
  var n = findNode(id); if(n){ n._delConfirm=false; render(); }
}
function doDelete(id){
  if(selectedId===id){ selectedId=null; closeDetail(); }
  extractNode(id); render();
}

function startRename(id){
  var n = findNode(id); if(!n) return;
  n._renaming=true; n._renameVal=n.label; render();
  requestAnimationFrame(function(){ var el=document.getElementById('rni-'+id); if(el){el.focus();el.select();} });
}
function confirmRename(id){
  var n = findNode(id); if(!n) return;
  var inp = document.getElementById('rni-'+id);
  var v = inp ? inp.value.trim() : n._renameVal;
  if(v) n.label = v;
  n._renaming=false; n._renameVal=''; render();
}
function cancelRename(id){
  var n = findNode(id); if(n){ n._renaming=false; n._renameVal=''; render(); }
}

function startAddCX(id){
  var n = findNode(id); if(!n) return;
  n._addingCX=true; n.open=true; inputVals[id]=''; render();
  requestAnimationFrame(function(){ var el=document.getElementById('cxi-'+id); if(el) el.focus(); });
}
function confirmCX(id){
  var val = (document.getElementById('cxi-'+id)||{}).value || '';
  val = val.trim();
  if(!val){ var el=document.getElementById('cxi-'+id); if(el) el.focus(); return; }
  var n = findNode(id); if(!n) return;
  n.children.push(makeContainer('complex', val));
  n._addingCX=false; delete inputVals[id]; render();
}
function cancelCX(id){
  var n = findNode(id); if(n){ n._addingCX=false; delete inputVals[id]; render(); }
}

function setAllOpen(val){
  function walk(ns){ ns.forEach(function(n){ n.open=val; walk(n.children); }); }
  walk(tree); render();
}
function clearAll(){ tree=[]; selectedId=null; closeDetail(); render(); }

function saveJSON(){
  var blob=new Blob([JSON.stringify({tree:tree,UID:UID},null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='PRA_decompositie.json'; a.click();
}
function loadJSON(){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=function(e){
    var r=new FileReader();
    r.onload=function(ev){
      try{ var d=JSON.parse(ev.target.result); tree=d.tree||[]; UID=d.UID||UID; render(); }
      catch(err){ alert('Ongeldig bestand: '+err.message); }
    };
    r.readAsText(e.target.files[0]);
  };
  inp.click();
}

var TAGS   = {areaal:'Areaal / Portefeuille', complex:'Complex', bo:'Beheerobject'};

function renderNode(n){
  var color = COLORS[n.type] || 'var(--acc)';
  var tag   = TAGS[n.type]   || n.type;
  var bo    = n.type==='bo' ? BOMAP[n.boCode] : null;
  var isSel = n.id===selectedId;

  // Icon
  var iconStr;
  if(n.type==='bo'){
    iconStr = svgIcon(n.boCode, 18, color);
  } else if(n.type==='areaal'){
    iconStr = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>';
  } else {
    iconStr = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>';
  }

  // Badges
  var badges = '';
  if(bo){
    var disC = (n.disabledEls||[]).length;
    var jaC  = bo.elementen.filter(function(e){ return e.classificatie==='JA' && (n.disabledEls||[]).indexOf(e.element)<0; }).length;
    badges = '<div class="nd-badges">'+
      '<span class="badge bja">▲'+jaC+'</span>'+
      '<span class="badge bop">◆'+bo.stats.optioneel+'</span>'+
      '<span class="badge bne">✕'+bo.stats.nee+'</span>'+
      (disC>0?'<span style="font-size:10px;color:var(--op);font-weight:700">'+disC+' uit</span>':'')+
    '</div>';
  }

  // Actions
  var acts = '<button class="nact" data-action="rename" data-id="'+n.id+'">✎</button>';
  if(n.type==='areaal'){
    acts += '<button class="nact" data-action="addcx" data-id="'+n.id+'">+ Complex</button>';
  }
  if(n._delConfirm){
    acts += '<span style="font-size:10px;color:var(--ne);font-weight:700;margin:0 2px">Zeker?</span>'+
      '<button class="nact del" data-action="dodel" data-id="'+n.id+'">Ja</button>'+
      '<button class="nact" data-action="canceldel" data-id="'+n.id+'">Nee</button>';
  } else {
    acts += '<button class="nact del" data-action="askdel" data-id="'+n.id+'">×</button>';
  }

  var hd = '<div class="nd-hd" id="hd-'+n.id+'" data-id="'+n.id+'" data-type="'+n.type+'">'+
    '<div class="nd-bar" style="background:'+color+'"></div>'+
    iconStr+
    '<div class="nd-meta">'+
      '<div class="nd-tag" style="color:'+color+'">'+tag+'</div>'+
      '<div class="nd-lbl">'+(bo?bo.code+' — ':'')+n.label+'</div>'+
      (bo?'<div class="nd-sub">'+bo.primaire_functie+'</div>':'')+
    '</div>'+
    badges+
    '<div class="nd-acts">'+acts+'</div>'+
    '<span class="nd-chev">▶</span>'+
  '</div>';

  var renameForm = '';
  if(n._renaming){
    renameForm = '<div class="nd-form">'+
      '<input id="rni-'+n.id+'" value="'+esc(n._renameVal)+'">'+
      '<button class="fok" data-action="confirmrename" data-id="'+n.id+'">OK</button>'+
      '<button class="fcan" data-action="cancelrename" data-id="'+n.id+'">✕</button>'+
    '</div>';
  }

  var kidsPanel = '';
  if(n.type!=='bo'){
    var cxForm = '';
    if(n._addingCX){
      cxForm = '<div class="cx-form">'+
        '<input id="cxi-'+n.id+'" placeholder="Naam complex…">'+
        '<button class="cx-fok" data-action="confirmcx" data-id="'+n.id+'">+ Toevoegen</button>'+
        '<button class="fcan" data-action="cancelcx" data-id="'+n.id+'">✕</button>'+
      '</div>';
    }
    var kidsHtml = n.children.map(function(c){ return renderNode(c); }).join('');
    var strip = '<div class="drop-strip" id="strip-'+n.id+'" data-pid="'+n.id+'">+ Zet hier neer</div>';
    kidsPanel = '<div class="nd-kids" id="kids-'+n.id+'">'+cxForm+kidsHtml+strip+'</div>';
  }

  return '<div class="nd nd-'+n.type+(n.open?' open':'')+(isSel?' sel':'')+'" id="nd-'+n.id+'">'+hd+renameForm+kidsPanel+'</div>';
}

function render(){
  var area = document.getElementById('tree-area');
  if(!tree.length){
    area.innerHTML = '<div class="empty"><h2>Lege decompositie</h2><p>Voeg een <strong>Areaal / Portefeuille</strong> toe, maak een <strong>Complex</strong> aan en sleep beheerobjecten vanuit de zijbalk.</p></div>';
    updateStats(); renderLib(); return;
  }
  var rootStrip = '<div class="drop-strip vis" id="strip-root" data-pid="root">+ Zet hier neer (root niveau)</div>';
  area.innerHTML = tree.map(function(n){ return renderNode(n); }).join('') + rootStrip;

  attachTreeEvents();
  if(selectedId) renderDetail(selectedId);
  updateStats(); renderLib();
}

// ─── All tree events wired here after render ────────────────────────
function attachTreeEvents(){
  // Header clicks
  document.querySelectorAll('.nd-hd').forEach(function(hd){
    hd.addEventListener('click', function(e){
      if(e.target.closest('.nd-acts')) return;
      var id = hd.dataset.id;
      var type = hd.dataset.type;
      if(type==='bo'){ selectBO(id); } else { toggleNode(id); }
    });
    // Drag from tree node
    hd.setAttribute('draggable','true');
    hd.addEventListener('dragstart', function(e){
      e.stopPropagation();
      var n = findNode(hd.dataset.id);
      drag = {from:'tree', id:hd.dataset.id};
      showGhost(n?n.label:'', e);
      e.dataTransfer.effectAllowed = 'move';
    });
    hd.addEventListener('dragend', function(){ hideGhost(); clearDragUI(); drag=null; });
    hd.addEventListener('dragover', function(e){
      e.preventDefault(); e.stopPropagation();
      document.querySelectorAll('.nd-hd.dov').forEach(function(x){ x.classList.remove('dov'); });
      hd.classList.add('dov');
    });
    hd.addEventListener('dragleave', function(){ hd.classList.remove('dov'); });
    hd.addEventListener('drop', function(e){
      e.preventDefault(); e.stopPropagation();
      hd.classList.remove('dov');
      var target = findNode(hd.dataset.id);
      if(!target || target.type==='bo') return;
      if(drag && drag.from==='lib'){
        target.children.push(makeBO(drag.code)); target.open=true;
      } else if(drag && drag.from==='tree' && drag.id!==hd.dataset.id){
        if(isAncestor(drag.id, hd.dataset.id)) return;
        var src = extractNode(drag.id);
        if(src){ target.children.push(src); target.open=true; }
      }
      render(); drag=null;
    });
  });

  // Action buttons
  document.querySelectorAll('[data-action]').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var id = btn.dataset.id;
      var act = btn.dataset.action;
      if(act==='rename')      startRename(id);
      else if(act==='addcx')  startAddCX(id);
      else if(act==='askdel') askDel(id);
      else if(act==='dodel')  doDelete(id);
      else if(act==='canceldel') cancelDel(id);
      else if(act==='confirmrename') confirmRename(id);
      else if(act==='cancelrename')  cancelRename(id);
      else if(act==='confirmcx') confirmCX(id);
      else if(act==='cancelcx')  cancelCX(id);
    });
  });

  // Rename input — Enter/Escape
  document.querySelectorAll('[id^="rni-"]').forEach(function(inp){
    var id = inp.id.replace('rni-','');
    inp.addEventListener('keydown', function(e){
      if(e.key==='Enter') confirmRename(id);
      if(e.key==='Escape') cancelRename(id);
    });
  });

  // CX input — Enter/Escape
  document.querySelectorAll('[id^="cxi-"]').forEach(function(inp){
    var id = inp.id.replace('cxi-','');
    inp.addEventListener('keydown', function(e){
      if(e.key==='Enter') confirmCX(id);
      if(e.key==='Escape') cancelCX(id);
    });
  });

  // Drop strips
  document.querySelectorAll('.drop-strip').forEach(function(strip){
    var pid = strip.dataset.pid;
    strip.addEventListener('dragover', function(e){ e.preventDefault(); e.stopPropagation(); strip.classList.add('ov'); });
    strip.addEventListener('dragleave', function(){ strip.classList.remove('ov'); });
    strip.addEventListener('drop', function(e){
      e.preventDefault(); e.stopPropagation();
      strip.classList.remove('ov','vis');
      var arr = pid==='root' ? tree : (findNode(pid)||{children:[]}).children;
      if(drag && drag.from==='lib'){ arr.push(makeBO(drag.code)); }
      else if(drag && drag.from==='tree' && drag.id!==pid){
        var src = extractNode(drag.id); if(src) arr.push(src);
      }
      render(); drag=null;
    });
  });
}

// ═══════════════════════════════════════════
// SIDEBAR LIBRARY
// ═══════════════════════════════════════════
var libQ='', libF='all';

document.querySelectorAll('.stab').forEach(function(tab){
  tab.addEventListener('click', function(){
    libF = tab.dataset.f;
    document.querySelectorAll('.stab').forEach(function(t){ t.className='stab'; });
    tab.classList.add(libF==='all'?'on':libF==='JA'?'on-ja':libF==='OPTIONEEL'?'on-op':'on-ne');
    renderLib();
  });
});
document.getElementById('sb-search').addEventListener('input', function(e){ libQ=e.target.value; renderLib(); });

function renderLib(){
  var q = libQ.toLowerCase();
  var items = BOLIB.filter(function(b){
    return (!q || b.naam.toLowerCase().indexOf(q)>=0 || b.code.toLowerCase().indexOf(q)>=0) &&
           (libF==='all' || b.elementen.some(function(e){ return e.classificatie===libF; }));
  });
  document.getElementById('sb-cnt').textContent = items.length;
  document.getElementById('bo-list').innerHTML = items.map(function(b){
    return '<div class="bo-item" draggable="true" data-code="'+b.code+'">'+
      svgIcon(b.code, 18, 'var(--acc)')+
      '<span class="bcode">'+b.code+'</span>'+
      '<span class="bname">'+b.naam+'</span>'+
      '<span class="bcnt">'+b.stats.totaal+'</span>'+
    '</div>';
  }).join('');

  document.querySelectorAll('.bo-item').forEach(function(el){
    el.addEventListener('dragstart', function(e){
      drag = {from:'lib', code:el.dataset.code};
      el.classList.add('dragging');
      showGhost(BOMAP[el.dataset.code]?BOMAP[el.dataset.code].naam:el.dataset.code, e);
      e.dataTransfer.effectAllowed='copy';
    });
    el.addEventListener('dragend', function(){ el.classList.remove('dragging'); hideGhost(); });
    el.addEventListener('dblclick', function(){
      var cx = firstType(tree,'complex');
      if(!cx){ alert('Maak eerst een Complex aan.'); return; }
      cx.children.push(makeBO(el.dataset.code)); cx.open=true; render();
    });
  });
}

// ═══════════════════════════════════════════
// TOOLBAR + MISC
// ═══════════════════════════════════════════
document.getElementById('top-btn').addEventListener('click', topAdd);
document.getElementById('top-inp').addEventListener('keydown', function(e){ if(e.key==='Enter') topAdd(); });
document.getElementById('btn-expand').addEventListener('click',  function(){ setAllOpen(true); });
document.getElementById('btn-collapse').addEventListener('click', function(){ setAllOpen(false); });
document.getElementById('btn-clear').addEventListener('click',   clearAll);
document.getElementById('btn-save').addEventListener('click',    saveJSON);
document.getElementById('btn-load').addEventListener('click',    loadJSON);
document.getElementById('dp-close').addEventListener('click',    closeDetail);

function updateStats(){
  var ap=0, cx=0, bo=0;
  function w(ns){ ns.forEach(function(n){ if(n.type==='areaal')ap++; else if(n.type==='complex')cx++; else if(n.type==='bo')bo++; w(n.children); }); }
  w(tree);
  document.getElementById('s-ap').textContent = ap;
  document.getElementById('s-cx').textContent = cx;
  document.getElementById('s-bo').textContent = bo;
  document.getElementById('tinfo').textContent = ap+' arealen · '+cx+' complexen · '+bo+' beheerobjecten';
}

// INIT
renderLib();
render();
</script>
